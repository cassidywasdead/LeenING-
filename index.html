<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; font-family: 'Poppins', sans-serif;
            overflow: hidden; position: relative; color: white;
            
            /* iPhone UI Fix */
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;           
            touch-action: none; 
        }

        /* 🔒 1. ENTRY SCREEN */
        #entry-screen {
            position: fixed; inset: 0; background: #050505;
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        #face-id-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #face-id-icon { width: 80px; height: 80px; stroke: #ff4d85; fill: none; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.6)); transition: opacity 0.3s; }
        
        #scan-spinner { position: absolute; inset: 0; width: 120px; height: 120px; animation: spin 1s linear infinite; display: none; }
        #scan-spinner circle { fill: none; stroke: rgba(255, 77, 133, 0.8); stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 50; stroke-linecap: round; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #apple-tick { position: absolute; width: 80px; height: 80px; display: none; }
        .tick-path { fill: none; stroke: #4cd964; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 10px #4cd964); }

        #instruction-text { margin-top: 25px; color: #ff4d85; font-size: 1.2rem; font-weight: 600; text-align: center; }
        #terminal-logs { margin-top: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #00ff00; width: 85%; max-width: 350px; text-align: left; height: 160px; overflow: hidden; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5); line-height: 1.5; }

        /* 🌊 2. MAIN WORLD */
        #main-world {
            display: none; opacity: 0;
            background: url('Background.jpg') no-repeat center center fixed;
            background-size: cover; width: 100vw; height: 100vh; position: relative;
        }

        /* 🫧 ULTRA REALISTIC 3D BUBBLES 🫧 */
        #bubble-pool { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        
        /* Container for smooth Y-axis movement */
        .bubble-y { position: absolute; bottom: -100px; will-change: transform; animation: floatUp linear infinite; }
        
        /* Container for smooth X-axis wobble */
        .bubble-x { width: 100%; height: 100%; will-change: transform; animation: wobbleX ease-in-out infinite alternate; }
        
        /* The actual bubble styling */
        .bubble {
            width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            /* Pink & Cyan tint + White center */
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.05) 40%, transparent 60%);
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.3),
                inset 10px 0 20px rgba(255, 77, 133, 0.2), /* Pink reflection */
                inset -10px 0 20px rgba(0, 255, 255, 0.2), /* Cyan reflection */
                0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        /* Top Left Glare (Shine) */
        .bubble::before {
            content: ''; position: absolute; top: 12%; left: 15%; width: 35%; height: 25%;
            border-radius: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.9), transparent);
            transform: rotate(-45deg);
        }

        @keyframes floatUp { 100% { transform: translateY(-120vh); } }
        @keyframes wobbleX { 0% { transform: translateX(-20px); } 100% { transform: translateX(20px); } }

        /* 📸 PHOTOS TRAPPED INSIDE REAL BUBBLES */
        #photo-pool { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        
        .photo-x { position: absolute; left: -150px; will-change: transform; animation: swimRight linear infinite; }
        .photo-y { width: 120px; height: 120px; will-change: transform; animation: bobbingY ease-in-out infinite alternate; }
        
        .photo-bubble {
            width: 100%; height: 100%; border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            /* Same Pink/Cyan 3D Glass Effect */
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.6),
                inset 10px 0 30px rgba(255, 77, 133, 0.3),
                inset -10px 0 30px rgba(0, 255, 255, 0.3),
                0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden; position: relative;
        }
        
        /* The Photo */
        .photo-bubble img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.85; /* Thoda transparent taaki paani ke andar lage */
        }
        
        /* The Glassy Glare OVER the photo */
        .photo-bubble::after {
            content: ''; position: absolute; top: 5%; left: 15%; width: 40%; height: 25%;
            border-radius: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            transform: rotate(-30deg); z-index: 2; pointer-events: none;
        }

        @keyframes swimRight { 100% { transform: translateX(125vw); } }
        @keyframes bobbingY { 0% { transform: translateY(-15px); } 100% { transform: translateY(15px); } }

    </style>
</head>
<body>

    <div id="entry-screen">
        <div id="face-id-container" onclick="startUnlockSequence()">
            <svg id="face-id-icon" viewBox="0 0 100 100">
                <path d="M 30,20 Q 20,20 20,30 L 20,40 M 70,20 Q 80,20 80,30 L 80,40 M 20,60 L 20,70 Q 20,80 30,80 M 80,60 L 80,70 Q 80,80 70,80" />
                <path d="M 40,40 L 40,50 M 60,40 L 60,50" />
                <path d="M 50,45 L 50,60 M 40,65 Q 50,75 60,65" />
            </svg>
            <svg id="scan-spinner" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" />
            </svg>
            <svg id="apple-tick" viewBox="0 0 100 100">
                <path class="tick-path" id="tick-mark" d="M 25,50 L 45,70 L 75,30" />
            </svg>
        </div>
        
        <div id="instruction-text">Tap to Scan Face ID</div>
        <div id="terminal-logs"></div>
    </div>

    <div id="main-world">
        <div id="bubble-pool"></div>
        <div id="photo-pool"></div>
    </div>

    <script>
        const hackLogs = [
            "> Running DNA analysis...",
            "> Consulting Elon Musk...",
            "> Verifying Ahrnav’s haemoglobin...",
            "> Peeking Ahrnav’s heart...",
            "> Calling Stephen Hawking...",
            "> Hacking Ahrnav's mind...",
            "> Stole data from NASA...",
            "> Missed call rcvd from Jaadu...",
            "> Using Doraemon’s gadget...",
            `<div style="text-align: center; font-size: 1.8rem; color: #ff4d85; text-shadow: 0 0 15px #ff4d85; margin-top: 15px; font-weight: bold; font-family: 'Poppins', sans-serif;">Welcome Lovleen</div>`
        ];

        let isScanning = false;

        function startUnlockSequence() {
            if(isScanning) return; 
            isScanning = true;

            document.getElementById('instruction-text').innerText = "Scanning...";
            document.getElementById('face-id-icon').style.opacity = '0.3'; 
            document.getElementById('scan-spinner').style.display = 'block';

            const logBox = document.getElementById('terminal-logs');
            logBox.innerHTML = "";
            let logIndex = 0;

            const logInterval = setInterval(() => {
                if (logIndex < hackLogs.length) {
                    logBox.innerHTML += hackLogs[logIndex] + "<br>";
                    logBox.scrollTop = logBox.scrollHeight;
                    
                    if (logIndex === hackLogs.length - 1) {
                        confetti({
                            particleCount: 200, spread: 100, origin: { y: 0.6 },
                            colors: ['#ff4d85', '#00ff00', '#ffffff'], zIndex: 9999
                        });
                    }
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                    setTimeout(showGreenTick, 1500); 
                }
            }, 1500); 
        }

        function showGreenTick() {
            document.getElementById('face-id-icon').style.display = 'none';
            document.getElementById('scan-spinner').style.display = 'none';
            document.getElementById('instruction-text').innerText = "Access Granted.";
            document.getElementById('instruction-text').style.color = "#4cd964";

            const tickSvg = document.getElementById('apple-tick');
            tickSvg.style.display = 'block';
            
            gsap.to("#tick-mark", { strokeDashoffset: 0, duration: 0.6, ease: "power2.out", onComplete: () => {
                    setTimeout(launchWorld, 1000);
                }
            });
        }

        function launchWorld() {
            gsap.to("#entry-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('entry-screen').style.display = 'none';
                const world = document.getElementById('main-world');
                world.style.display = 'block';
                gsap.to(world, { opacity: 1, duration: 1 });
                
                spawnBubbles();
                spawnFishes();
            }});
        }

        // 🫧 Smooth Transparent Bubbles
        function spawnBubbles() {
            const bp = document.getElementById('bubble-pool');
            for(let i=0; i<15; i++) { 
                const yWrap = document.createElement('div');
                yWrap.className = 'bubble-y';
                yWrap.style.left = Math.random() * 100 + 'vw';
                yWrap.style.animationDuration = `${Math.random() * 8 + 8}s`; 
                yWrap.style.animationDelay = `${Math.random() * -10}s`;

                const xWrap = document.createElement('div');
                xWrap.className = 'bubble-x';
                xWrap.style.animationDuration = `${Math.random() * 3 + 2}s`; 
                xWrap.style.animationDelay = `${Math.random() * -5}s`;

                const b = document.createElement('div');
                b.className = 'bubble';
                let s = Math.random() * 30 + 15; // 15px to 45px
                yWrap.style.width = yWrap.style.height = s + 'px';

                xWrap.appendChild(b);
                yWrap.appendChild(xWrap);
                bp.appendChild(yWrap);
            }
        }

        // 📸 Smooth Photo Bubbles
        function spawnFishes() {
            const pp = document.getElementById('photo-pool');
            for(let i=1; i<=15; i++) {
                const xWrap = document.createElement('div');
                xWrap.className = 'photo-x';
                xWrap.style.top = (Math.random() * 70 + 10) + 'vh';
                xWrap.style.animationDuration = (Math.random() * 15 + 20) + 's'; // Slow smooth swim
                xWrap.style.animationDelay = (Math.random() * -30) + 's';

                const yWrap = document.createElement('div');
                yWrap.className = 'photo-y';
                yWrap.style.animationDuration = (Math.random() * 4 + 3) + 's'; // Bobbing up and down
                yWrap.style.animationDelay = (Math.random() * -5}s`;

                const pBubble = document.createElement('div');
                pBubble.className = 'photo-bubble';
                
                const img = document.createElement('img');
                img.src = `photo1-${i}.jpg`; 
                img.onerror = function() { xWrap.style.display = 'none'; };

                pBubble.appendChild(img);
                yWrap.appendChild(pBubble);
                xWrap.appendChild(yWrap);
                pp.appendChild(xWrap);
            }
        }
    </script>
</body>
</html>
