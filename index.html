<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Leenie ❤️</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    overflow:hidden;
}
#entry-screen,#magic-menu-overlay,#section-modal{
    position:fixed;
    inset:0;
}
#entry-screen{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#050505;
    z-index:999;
}
#unlock-btn{
    font-size:5rem;
    cursor:pointer;
}
#main-world{
    display:none;
    width:100vw;
    height:100vh;
    position:relative;
    background:radial-gradient(circle,#1a0010,#000);
}
#heart-pool{
    position:absolute;
    inset:0;
    overflow:hidden;
}
.heart{
    position:absolute;
    bottom:-20px;
    animation:floatUp linear infinite;
}
@keyframes floatUp{
    to{transform:translateY(-110vh);opacity:0}
}
#menu-trigger{
    position:fixed;
    top:20px;
    left:20px;
    font-size:2rem;
    z-index:20;
    cursor:pointer;
}
#magic-menu-overlay{
    background:rgba(0,0,0,.9);
    display:none;
}
.wheel-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:300px;
    border-radius:50%;
}
.wheel-item{
    position:absolute;
    width:100px;
    text-align:center;
    transform:rotate(calc(60deg * var(--i))) translateY(-130px) rotate(calc(-60deg * var(--i)));
}
.wheel-icon{
    font-size:2rem;
    cursor:pointer;
}
#section-modal{
    display:none;
    background:rgba(0,0,0,.95);
    overflow:hidden;
}
#petal-container{
    position:absolute;
    inset:0;
    pointer-events:none;
}
.petal{
    position:absolute;
    top:-30px;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);opacity:0}
}
.modal-box{
    position:relative;
    width:90%;
    max-width:600px;
    height:80vh;
    margin:5vh auto;
    background:rgba(255,255,255,.05);
    border-radius:20px;
    padding:20px;
    overflow:auto;
}
.lang-card{
    margin:12px 0;
    padding:15px;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    opacity:0;
    transform:translateY(-40px);
    position:relative;
}
.card-watermark{
    position:absolute;
    right:10px;
    bottom:0;
    font-size:3rem;
    opacity:.15;
}
</style>
</head>
<body>

<div id="entry-screen">
    <div id="unlock-btn" onclick="unlock()">🔓</div>
    <p>Tap to unlock Lovleen's world ❤️</p>
</div>

<div id="main-world">
    <div id="heart-pool"></div>
    <div id="menu-trigger" onclick="toggleMenu()">✉️</div>
</div>

<div id="magic-menu-overlay">
    <div class="wheel-container">
        <div class="wheel-item" style="--i:0"><div class="wheel-icon" onclick="openLanguages()">🌍</div></div>
        <div class="wheel-item" style="--i:1"><div class="wheel-icon">♾️</div></div>
        <div class="wheel-item" style="--i:2"><div class="wheel-icon">🧪</div></div>
        <div class="wheel-item" style="--i:3"><div class="wheel-icon">💌</div></div>
        <div class="wheel-item" style="--i:4"><div class="wheel-icon">⏳</div></div>
        <div class="wheel-item" style="--i:5"><div class="wheel-icon">🕯️</div></div>
    </div>
</div>

<div id="section-modal">
    <div id="petal-container"></div>
    <div class="modal-box">
        <h2>🌹 100 Languages of Love 🌹</h2>
        <div id="modal-body"></div>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
const languagesData = Array.from({length:100},(_,i)=>`${i+1}. Language ${i+1}: I love you Lovleen ❤️`).join('\\n');
let petalInterval;

function unlock(){
    document.getElementById("entry-screen").style.display="none";
    document.getElementById("main-world").style.display="block";
    spawnHearts();
    confetti({particleCount:150,spread:90});
}
function spawnHearts(){
    const pool=document.getElementById("heart-pool");
    for(let i=0;i<25;i++){
        const h=document.createElement("div");
        h.className="heart";
        h.innerText="❤️";
        h.style.left=Math.random()*100+"vw";
        h.style.animationDuration=(Math.random()*6+6)+"s";
        h.style.fontSize=(Math.random()*20+15)+"px";
        pool.appendChild(h);
    }
}
function toggleMenu(){
    const m=document.getElementById("magic-menu-overlay");
    m.style.display=m.style.display==="block"?"none":"block";
}
function startPetals(){
    const c=document.getElementById("petal-container");
    const petals=["🌹","🌸","💖","✨"];
    petalInterval=setInterval(()=>{
        const p=document.createElement("div");
        p.className="petal";
        p.innerText=petals[Math.floor(Math.random()*petals.length)];
        p.style.left=Math.random()*100+"vw";
        p.style.animationDuration=(Math.random()*4+5)+"s";
        c.appendChild(p);
        setTimeout(()=>p.remove(),9000);
    },180);
}
function openLanguages(){
    const body=document.getElementById("modal-body");
    let html="";
    languagesData.split("\\n").forEach(line=>{
        html+=`<div class="lang-card"><div class="card-watermark">✨</div><b>${line.split(":")[0]}</b><p>${line.split(":")[1]}</p></div>`;
    });
    body.innerHTML=html;
    document.getElementById("section-modal").style.display="block";
    gsap.to(".lang-card",{opacity:1,y:0,stagger:0.05,duration:0.6});
    startPetals();
}
function closeModal(){
    clearInterval(petalInterval);
    document.getElementById("section-modal").style.display="none";
    document.getElementById("petal-container").innerHTML="";
}
</script>
</body>
</html>
