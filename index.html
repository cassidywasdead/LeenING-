<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You Leenie ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('Background.jpg') no-repeat center center fixed;
            background-color: #ffb6c1; 
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 1;
        }

        /* === Airplane Banner === */
        .airplane-container {
            position: fixed;
            top: 50px;
            left: 0; 
            display: flex;
            align-items: center;
            z-index: 10;
            animation: flyAcross 20s linear infinite;
            will-change: transform;
        }

        .airplane {
            font-size: 40px;
            transform: scaleX(-1);
        }

        .banner {
            font-family: 'Dancing Script', cursive;
            background-color: white;
            color: #d81b60;
            padding: 10px 25px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: -10px; 
            white-space: nowrap; 
            position: relative;
        }

        .banner::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid white;
        }

        @keyframes flyAcross {
            0% { transform: translateX(-400px); }
            100% { transform: translateX(100vw); }
        }

        /* === Main Container === */
        .main-container {
            position: relative;
            z-index: 5; 
            text-align: center;
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; 
            width: 90%;
            max-width: 350px; 
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #ff4d85; 
            margin-bottom: 5px;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }

        p.subtitle {
            font-size: 1rem;
            margin-bottom: 25px;
            color: white;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* === Reel Style Vertical Counter === */
        .reel-counter {
            display: flex;
            flex-direction: column;
            gap: 10px; 
            align-items: center;
        }

        .reel-pill {
            background: rgba(0, 0, 0, 0.55);
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            width: 95%;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }

        .reel-pill span.num {
            font-weight: 700;
            font-size: 1.3rem;
            margin-right: 8px;
            color: #fff;
        }

        .reel-pill span.emoji {
            margin-left: auto; 
            font-size: 1.2rem;
        }

        .heart {
            font-size: 3rem;
            color: #e91e63;
            animation: beat 0.8s infinite alternate;
            margin-top: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(233, 30, 99, 0.4));
        }

        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* === Swimming Photos Section === */
        #photo-pool {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2; 
            overflow: hidden;
            pointer-events: none; 
        }

        .swimming-photo {
            position: absolute;
            width: 100px; 
            height: 120px;
            left: 0; 
            background: white;
            border: 5px solid white;
            border-bottom: 15px solid white; 
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            animation: swim 20s linear infinite;
            will-change: transform;
        }

        .swimming-photo img {
            width: 100%; 
            height: 100px;
            object-fit: cover; 
        }

        @keyframes swim {
            0% { transform: translate(-150px, 0px) rotate(0deg); }
            25% { transform: translate(25vw, 40px) rotate(8deg); }
            50% { transform: translate(50vw, -40px) rotate(-8deg); }
            75% { transform: translate(75vw, 20px) rotate(5deg); }
            100% { transform: translate(110vw, 0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="airplane-container">
        <span class="airplane">✈️</span>
        <div class="banner">welcome My leenie babyyy on our special day</div>
    </div>

    <div class="main-container">
        <h1>Days I Fell For You</h1>
        <p class="subtitle">Every moment with you counts...</p>

        <div class="reel-counter">
            <div class="reel-pill">
                <span class="num" id="val-years">0</span> years 
                <span class="emoji">✨</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-months">0</span> months 
                <span class="emoji">🫧</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-weeks">0</span> weeks 
                <span class="emoji">🌷</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-days">0</span> days 
                <span class="emoji">🪶</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-hours">0</span> hours 
                <span class="emoji">☘️</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-mins">0</span> minutes 
                <span class="emoji">👀</span>
            </div>
            <div class="reel-pill">
                <span class="num" id="val-secs">0</span> seconds 
                <span class="emoji">⏱️</span>
            </div>
        </div>

        <div class="heart">❤️</div>
    </div>

    <div id="photo-pool"></div>

    <script>
        // 5 April 2023, 3:00 PM
        const startDate = new Date(2023, 3, 5, 15, 0, 0); 

        function updateCounter() {
            const now = new Date();
            const difference = now.getTime() - startDate.getTime();

            // Total sum of each unit individually
            const totalSeconds = Math.floor(difference / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);
            const totalWeeks = Math.floor(totalDays / 7);
            
            // Accurate Months logic
            let totalMonths = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            if (now.getDate() < startDate.getDate() || (now.getDate() === startDate.getDate() && now.getHours() < startDate.getHours())) {
                totalMonths--;
            }
            
            const totalYears = Math.floor(totalMonths / 12);

            // Adding commas (e.g. 1,250,500)
            document.getElementById("val-years").innerText = totalYears.toLocaleString('en-US');
            document.getElementById("val-months").innerText = totalMonths.toLocaleString('en-US');
            document.getElementById("val-weeks").innerText = totalWeeks.toLocaleString('en-US');
            document.getElementById("val-days").innerText = totalDays.toLocaleString('en-US');
            document.getElementById("val-hours").innerText = totalHours.toLocaleString('en-US');
            document.getElementById("val-mins").innerText = totalMinutes.toLocaleString('en-US');
            document.getElementById("val-secs").innerText = totalSeconds.toLocaleString('en-US');
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        // Photos Setup
        const photos = [
            'photo1-1.jpg', 'photo1-2.jpg', 'photo1-3.jpg', 'photo1-4.jpg', 'photo1-5.jpg',
            'photo1-6.png', 'photo1-7.jpg', 'photo1-8.jpg', 'photo1-9.jpg', 'photo1-10.jpg',
            'photo1-11.jpg', 'photo1-12.jpg', 'photo1-13.jpg', 'photo1-14.jpg', 'photo1-15.jpg'
        ];

        const photoPool = document.getElementById('photo-pool');

        for (let i = 0; i < 15; i++) {
            const photoEl = document.createElement('div');
            photoEl.className = 'swimming-photo';
            
            const randomTop = Math.random() * 80 + 5; 
            photoEl.style.top = randomTop + 'vh';
            
            const randomDuration = Math.random() * 20 + 15; 
            photoEl.style.animationDuration = randomDuration + 's';
            
            const randomDelay = Math.random() * -30; 
            photoEl.style.animationDelay = randomDelay + 's';

            const imgEl = document.createElement('img');
            imgEl.src = photos[i];
            
            imgEl.onerror = function() {
                this.style.display = 'none';
                photoEl.style.background = 'transparent';
                photoEl.style.border = 'none';
                photoEl.style.boxShadow = 'none';
            };

            photoEl.appendChild(imgEl);
            photoPool.appendChild(photoEl);
        }
    </script>
</body>
</html>
