<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&family=JetBrains+Mono&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; font-family: 'Poppins', sans-serif;
            overflow: hidden; position: relative; color: white;
            
            /* iPhone Copy/Select Fix */
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;           
        }

        /* 🔒 1. ENTRY SCREEN */
        #entry-screen {
            position: fixed; inset: 0; background: #050505;
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        /* Face ID Container */
        #face-id-container {
            position: relative; width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; touch-action: none;
        }

        /* Apple Face ID SVG Icon */
        #face-id-icon {
            width: 80px; height: 80px;
            stroke: #ff4d85; fill: none; stroke-width: 4; stroke-linecap: round;
            filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.6));
            transition: opacity 0.3s;
        }

        /* Apple Scanner Spinner */
        #scan-spinner {
            position: absolute; inset: 0; width: 120px; height: 120px;
            animation: spin 1s linear infinite; display: none;
        }
        #scan-spinner circle {
            fill: none; stroke: rgba(255, 77, 133, 0.8); stroke-width: 4;
            stroke-dasharray: 200; stroke-dashoffset: 50; stroke-linecap: round;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Apple Green Success Tick */
        #apple-tick {
            position: absolute; width: 80px; height: 80px; display: none;
        }
        .tick-path {
            fill: none; stroke: #4cd964; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            filter: drop-shadow(0 0 10px #4cd964);
        }

        /* Text & Logs */
        #instruction-text {
            margin-top: 25px; color: #ff4d85; font-size: 1.2rem; font-weight: 600; text-align: center;
        }
        
        #terminal-logs {
            margin-top: 30px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; color: #00ff00; width: 85%; max-width: 350px;
            text-align: left; 
            height: 160px; 
            overflow: hidden;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            line-height: 1.5;
        }

        /* 🌊 2. MAIN WORLD */
        #main-world {
            display: none; opacity: 0;
            background: url('Background.jpg') no-repeat center center fixed;
            background-size: cover; width: 100vw; height: 100vh; position: relative;
        }

        /* Center Title */
        #title-container { text-align: center; padding-top: 10vh; color: white; position: relative; z-index: 20;}
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ff4d85; text-shadow: 0 0 10px #000; margin: 0; }
        .subtitle { font-size: 1.2rem; font-weight: 600; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* Fish Photos */
        .swimming-photo {
            position: absolute; width: 130px; height: 85px; left: -150px;
            clip-path: url(#fishShape); background: transparent; border: none; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: swim linear infinite; z-index: 10;
        }
        .swimming-photo img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes swim { 0% { transform: translateX(0); } 100% { transform: translateX(125vw); } }

    </style>
</head>
<body>

    <div id="entry-screen">
        <div id="face-id-container" onclick="startUnlockSequence()">
            <svg id="face-id-icon" viewBox="0 0 100 100">
                <path d="M 30,20 Q 20,20 20,30 L 20,40 M 70,20 Q 80,20 80,30 L 80,40 M 20,60 L 20,70 Q 20,80 30,80 M 80,60 L 80,70 Q 80,80 70,80" />
                <path d="M 40,40 L 40,50 M 60,40 L 60,50" />
                <path d="M 50,45 L 50,60 M 40,65 Q 50,75 60,65" />
            </svg>
            <svg id="scan-spinner" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" />
            </svg>
            <svg id="apple-tick" viewBox="0 0 100 100">
                <path class="tick-path" id="tick-mark" d="M 25,50 L 45,70 L 75,30" />
            </svg>
        </div>
        
        <div id="instruction-text">Tap to Scan Face ID</div>
        <div id="terminal-logs"></div>
    </div>

    <div id="main-world">
        <div id="title-container">
            <h1>Days I Fell For You</h1>
            <p class="subtitle">Every moment with you counts...</p>
        </div>
        <div id="photo-pool"></div>
    </div>

    <svg width="0" height="0">
        <defs>
            <clipPath id="fishShape" clipPathUnits="objectBoundingBox">
                <path d="M0,0.5 C0.05,0.2, 0.25,0, 0.5,0 C0.85,0, 1,0.25, 1,0.5 C1,0.75, 0.85,1, 0.5,1 C0.25,1, 0.05,0.8, 0,0.5 Z M0.92,0.5 L1,0.35 L1,0.65 Z"></path>
            </clipPath>
        </defs>
    </svg>

    <script>
        const hackLogs = [
            "> Running DNA analysis...",
            "> Consulting Elon Musk...",
            "> Verifying Ahrnav’s haemoglobin...",
            "> Peeking Ahrnav’s heart...",
            "> Calling Stephen Hawking...",
            "> Hacking Ahrnav's mind...",
            "> Stole data from NASA...",
            "> Missed call rcvd from Jaadu...",
            "> Using Doraemon’s gadget...",
            // Emojis removed, purely styled text
            `<div style="text-align: center; font-size: 1.8rem; color: #ff4d85; text-shadow: 0 0 15px #ff4d85; margin-top: 15px; font-weight: bold; font-family: 'Poppins', sans-serif;">Welcome Lovleen</div>`
        ];

        let isScanning = false;

        function startUnlockSequence() {
            if(isScanning) return; 
            isScanning = true;

            document.getElementById('instruction-text').innerText = "Scanning...";
            document.getElementById('face-id-icon').style.opacity = '0.3'; 
            document.getElementById('scan-spinner').style.display = 'block';

            const logBox = document.getElementById('terminal-logs');
            logBox.innerHTML = "";
            let logIndex = 0;

            const logInterval = setInterval(() => {
                if (logIndex < hackLogs.length) {
                    logBox.innerHTML += hackLogs[logIndex] + "<br>";
                    logBox.scrollTop = logBox.scrollHeight;
                    
                    // ASLI PATAKHE: Jab last line (Welcome Lovleen) aaye, tabhi blast hoga!
                    if (logIndex === hackLogs.length - 1) {
                        confetti({
                            particleCount: 150,
                            spread: 80,
                            origin: { y: 0.6 },
                            colors: ['#ff4d85', '#00ff00', '#ffffff'] // Matching theme colors
                        });
                    }
                    
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                    // Thoda delay dekar tick dikhayenge taaki patakhe enjoy kar sake
                    setTimeout(showGreenTick, 1000);
                }
            }, 1500); 
        }

        function showGreenTick() {
            document.getElementById('face-id-icon').style.display = 'none';
            document.getElementById('scan-spinner').style.display = 'none';
            document.getElementById('instruction-text').innerText = "Access Granted.";
            document.getElementById('instruction-text').style.color = "#4cd964";

            const tickSvg = document.getElementById('apple-tick');
            tickSvg.style.display = 'block';
            
            gsap.to("#tick-mark", { 
                strokeDashoffset: 0, 
                duration: 0.6, 
                ease: "power2.out", 
                onComplete: () => {
                    setTimeout(launchWorld, 1000);
                }
            });
        }

        function launchWorld() {
            gsap.to("#entry-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('entry-screen').style.display = 'none';
                
                const world = document.getElementById('main-world');
                world.style.display = 'block';
                gsap.to(world, { opacity: 1, duration: 1 });
                
                spawnFishes();
            }});
        }

        function spawnFishes() {
            const pp = document.getElementById('photo-pool');
            for(let i=1; i<=15; i++) {
                const p = document.createElement('div');
                p.className = 'swimming-photo';
                p.style.top = (Math.random() * 75 + 10) + 'vh';
                p.style.animationDuration = (Math.random() * 12 + 18) + 's';
                p.style.animationDelay = (Math.random() * -20) + 's';
                
                const img = document.createElement('img');
                img.src = `photo1-${i}.jpg`; 
                img.onerror = function() { this.style.display = 'none'; };

                p.appendChild(img);
                pp.appendChild(p);
            }
        }
    </script>
</body>
</html>
