<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&family=Dancing+Script:wght@700&family=Great+Vibes&display=swap');

        body { margin: 0; padding: 0; min-height: 100vh; background: #000; font-family: 'Poppins', sans-serif; overflow: hidden; position: relative; color: white; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }

        /* 🔒 ENTRY SCREEN */
        #entry-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #face-id-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #face-id-icon { width: 80px; height: 80px; stroke: #ff4d85; fill: none; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.6)); transition: opacity 0.3s; }
        #scan-spinner { position: absolute; inset: 0; width: 120px; height: 120px; animation: spin 1s linear infinite; display: none; }
        #scan-spinner circle { fill: none; stroke: rgba(255, 77, 133, 0.8); stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 50; stroke-linecap: round; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #apple-tick { position: absolute; width: 80px; height: 80px; display: none; }
        .tick-path { fill: none; stroke: #4cd964; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 10px #4cd964); }
        #instruction-text { margin-top: 25px; color: #ff4d85; font-size: 1.2rem; font-weight: 600; text-align: center; }
        #terminal-logs { margin-top: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #00ff00; width: 85%; max-width: 350px; text-align: left; height: 160px; overflow: hidden; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5); line-height: 1.5; }

        /* 🌊 MAIN WORLD */
        #main-world { display: none; opacity: 0; background: url('Background.jpg') no-repeat center center fixed; background-size: cover; width: 100vw; height: 100vh; position: relative; }
        #heart-pool { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
        .heart-wrapper { position: absolute; bottom: -50px; will-change: transform; animation: floatHeartUp linear infinite; }
        .heart-inner { width: 100%; height: 100%; will-change: transform; animation: swayHeart ease-in-out infinite alternate; }
        .heart-svg { width: 100%; height: 100%; fill: url(#redGradient); filter: drop-shadow(0 5px 10px rgba(255, 0, 64, 0.5)); }
        @keyframes floatHeartUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-110vh) scale(1.2); opacity: 0; } }
        @keyframes swayHeart { 0% { transform: translateX(-20px) rotate(-15deg); } 100% { transform: translateX(20px) rotate(15deg); } }

        #photo-pool { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
        .photo-rise { position: absolute; bottom: -150px; will-change: transform; animation: riseFromBottom linear infinite; }
        .photo-wobble { width: 110px; height: 110px; will-change: transform; animation: bobbingX ease-in-out infinite alternate; }
        .photo-bubble { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid rgba(255, 255, 255, 0.6); box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.6), inset 10px 0 30px rgba(255, 77, 133, 0.3), inset -10px 0 30px rgba(0, 255, 255, 0.3), 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        .photo-bubble img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease-in-out; will-change: opacity; }
        .photo-bubble::after { content: ''; position: absolute; top: 5%; left: 15%; width: 40%; height: 25%; border-radius: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent); transform: rotate(-30deg); z-index: 2; pointer-events: none; }
        @keyframes riseFromBottom { 100% { transform: translateY(-125vh); } }
        @keyframes bobbingX { 0% { transform: translateX(-15px); } 100% { transform: translateX(15px); } }

        /* 🎡 MAGIC MENU OVERLAY */
        #menu-trigger { position: fixed; top: 25px; left: 25px; z-index: 500; cursor: pointer; width: 55px; height: 55px; background: rgba(255, 255, 255, 0.1); border: 2px solid #f7d77b; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 2rem; backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(247, 215, 123, 0.5); animation: vibePulse 2s infinite ease-in-out; transition: all 0.3s ease; }
        @keyframes vibePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        #magic-menu-overlay { position: fixed; inset: 0; background: rgba(10, 5, 5, 0.95); backdrop-filter: blur(12px); z-index: 400; display: none; opacity: 0; }
        .magic-title { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 100%; font-family: 'Great Vibes', cursive; font-size: 4rem; text-align: center; margin: 0; z-index: 10; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #f6d365 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 4px 10px rgba(255,105,180,0.6)); }
        
        .wheel-wrapper { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        .wheel-container { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 2px dashed rgba(247, 215, 123, 0.4); display: flex; justify-content: center; align-items: center; }
        #home-btn { position: absolute; width: 65px; height: 65px; border-radius: 50%; background: rgba(247, 215, 123, 0.15); border: 2.5px solid #f7d77b; display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; z-index: 50; box-shadow: 0 0 25px rgba(247, 215, 123, 0.6); }

        .wheel-item { position: absolute; width: 110px; text-align: center; transform: rotate(calc(51.428deg * var(--i))) translateY(-155px) rotate(calc(-51.428deg * var(--i))); z-index: 10; }
        .item-inner { cursor: pointer; transition: transform 0.1s; display: flex; flex-direction: column; align-items: center; }
        .wheel-icon { font-size: 2.2rem; background: rgba(0,0,0,0.6); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid rgba(247, 215, 123, 0.8); box-shadow: 0 0 20px rgba(255, 77, 133, 0.5); position: relative; }
        .wheel-label { font-family: 'Dancing Script', cursive; font-size: 1.2rem; color: #fff; margin-top: 6px; line-height: 1.1; font-weight: bold; text-shadow: 0 0 8px #ff4d85; }
        .swipe-hint { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; font-size: 0.95rem; color: #f7d77b; letter-spacing: 4px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

        /* 📜 SECTION MODAL */
        #section-modal { position: fixed; inset: 0; background: rgba(5, 0, 10, 0.95); backdrop-filter: blur(15px); z-index: 1000; display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; perspective: 1000px; }
        #effect-container { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .modal-box { width: 90%; max-width: 500px; height: 80vh; background: rgba(255, 255, 255, 0.03); border: 1.5px solid rgba(247, 215, 123, 0.4); border-radius: 25px; box-shadow: 0 0 50px rgba(255, 77, 133, 0.2); position: relative; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .modal-close { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: linear-gradient(135deg, #ff4d85, #ff0040); color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff4d85; border: 2px solid #fff; z-index: 20; }
        .modal-header { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #f7d77b; text-align: center; margin-bottom: 10px; text-shadow: 0 0 15px rgba(247, 215, 123, 0.6); border-bottom: 1px solid rgba(247, 215, 123, 0.2); padding-bottom: 10px; z-index: 10; line-height: 1; }
        .modal-header span { font-family: 'Poppins', sans-serif; font-size: 1.1rem; color: #fff; text-shadow: none; font-weight: 300; display: block; margin-top: 5px; }
        .modal-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; scrollbar-width: none; z-index: 10; }

        /* 🎂 CAKE SECTION */
        .cake-scene { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; position: relative;}
        .css-cake { position: relative; width: 180px; height: 90px; margin-top: 100px; margin-bottom: 50px; display: flex; z-index: 5; }
        .cake-half { width: 50%; height: 100%; background: #ff4d85; position: relative; transition: transform 1.5s ease, opacity 1.5s ease; border-radius: 15px 0 0 15px; box-shadow: 0 15px 20px rgba(0,0,0,0.4); }
        .cake-right { border-radius: 0 15px 15px 0; }
        .cake-frosting-half { position: absolute; top: -5px; width: 105%; height: 40px; background: #fff; border-radius: 20px; }
        .cake-left.cut { transform: translateX(-80px) rotate(-20deg); opacity: 0; }
        .cake-right.cut { transform: translateX(80px) rotate(20deg); opacity: 0; }
        .cake-candles { position: absolute; top: -50px; width: 100%; left: 0; display: flex; justify-content: space-evenly; transition: opacity 0.5s;}
        .cake-candle { width: 14px; height: 45px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff4d85 5px, #ff4d85 10px); border-radius: 3px; position: relative; }
        .cake-flame { position: absolute; top: -28px; left: -2px; width: 18px; height: 28px; background: radial-gradient(ellipse at bottom, #f7d77b, #ff4d85, transparent); border-radius: 50% 50% 20% 20%; animation: flickerFlame 0.15s infinite alternate; box-shadow: 0 0 15px #f7d77b; transform-origin: bottom center; }
        @keyframes flickerFlame { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* 🎉 ANNIVERSARY BANNER */
        .anniversary-banner { position: absolute; top: 10%; left: 50%; transform: translateX(-50%) scale(0.5); opacity: 0; z-index: 100; width: 100%; font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ffebf0; text-align: center; text-shadow: 0 0 20px #ff4d85; line-height: 1.1; transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .anniversary-banner.show { transform: translateX(-50%) scale(1); opacity: 1; }

        .action-btn { background: linear-gradient(135deg, #f7d77b, #d4a737); color: #000; font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: bold; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 20px rgba(247, 215, 123, 0.5); margin-top: 20px;}

        /* 📜 WISH PAPER (Used in Make a Wish) */
        .paper-scene { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0; }
        .paper-ui { background: #fdf5e6; border: 2px solid #d4a737; border-radius: 8px; padding: 25px; width: 90%; height: 250px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .paper-ui textarea { width: 100%; height: 100%; background: transparent; border: none; outline: none; font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #553a1f; resize: none; }

        /* ⏳ CLOCK STYLES */
        .time-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .t-box { background: rgba(255, 77, 133, 0.15); border: 1.5px solid rgba(255, 77, 133, 0.5); border-radius: 12px; width: 100%; padding: 10px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .t-box span { font-size: 1.5rem; font-weight: bold; color: #f7d77b; font-family: 'JetBrains Mono', monospace; }
        .t-box small { font-size: 0.9rem; color: #fff; text-transform: uppercase; }

        /* 🚫 NEVER STYLES */
        .never-conclusion { text-align: center; font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #ff4d85; text-shadow: 0 0 20px rgba(255, 77, 133, 0.9); margin-top: 20px; animation: vibePulse 2s infinite; }

        /* OTHER STYLES */
        .lang-card { position: relative; margin-bottom: 20px; padding: 15px 20px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)); border-radius: 15px; border-left: 4px solid #ff4d85; overflow: hidden; opacity: 0; transform: translateY(-30px); }
        .card-watermark { position: absolute; right: 10px; bottom: -5px; font-size: 3.5rem; opacity: 0.2; pointer-events: none; filter: grayscale(50%); z-index: -1; }
        .lang-card b { color: #f7d77b; font-family: 'Poppins', sans-serif; font-size: 1.1rem; text-shadow: 0 0 5px rgba(247, 215, 123, 0.3); }
        .lang-card p { margin: 5px 0 0 0; font-size: 1.05rem; color: #fff; line-height: 1.4; }
        .lang-card span { display: block; font-size: 0.9rem; color: #ffb3c6; font-style: italic; margin-top: 8px; }
        .lang-special { text-align: center; color: #f7d77b; margin-top: 30px; padding: 20px; background: rgba(255, 77, 133, 0.1); border: 1px dashed #ff4d85; border-radius: 15px; font-size: 1.1rem; font-style: italic; }
        .condition-card { padding: 15px 20px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid #f7d77b; border-radius: 10px; color: #fff; font-size: 1.1rem; line-height: 1.4; box-shadow: 0 5px 15px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        .special-cond { font-family: 'Dancing Script', cursive; font-size: 1.8rem; text-align: center; border: 2px dashed; border-radius: 15px; padding: 20px; margin-top: 25px; margin-bottom: 25px; animation: pulseBox 2s infinite alternate; }
        .scold-cond { background: rgba(255, 77, 133, 0.15); border-color: #ff4d85; color: #ffebf0; text-shadow: 0 0 10px #ff4d85; }
        .irrit-cond { background: rgba(247, 215, 123, 0.15); border-color: #f7d77b; color: #fff; text-shadow: 0 0 10px #d4a737; }
        
        /* 📜 ANIMATED SCROLL STYLE */
        .animated-scroll-container {
            width: 100%; height: 100%; min-height: 60vh;
            background: url('scroll.png') no-repeat center center;
            background-size: 100% 100%;
            position: relative;
            padding: 70px 35px; /* Adjust padding to stay inside the paper part */
            box-sizing: border-box;
            transform-origin: top center;
            animation: unfurl 1.5s ease-in-out forwards;
            display: flex; flex-direction: column;
        }

        @keyframes unfurl {
            0% { transform: scaleY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .scroll-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem; color: #4a3018; /* Dark ink color */
            text-align: center; line-height: 1.6; font-weight: bold;
            overflow-y: auto; flex-grow: 1; padding-right: 5px;
        }
        .scroll-text::-webkit-scrollbar { display: none; }

        /* Effects */
        .real-petal { position: absolute; top: -30px; opacity: 0.9; animation: tumblePetal linear infinite; z-index: 0; }
        @keyframes tumblePetal { 0% { transform: translate3d(0, -20px, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); opacity: 0; } 10% { opacity: 0.9; } 50% { transform: translate3d(var(--drift), 50vh, 0) rotateX(180deg) rotateY(90deg) rotateZ(180deg); } 90% { opacity: 0.8; } 100% { transform: translate3d(calc(var(--drift) * -1), 110vh, 0) rotateX(360deg) rotateY(180deg) rotateZ(360deg); opacity: 0; } }
        .raindrop { position: absolute; top: -50px; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(200,230,255,0.7)); width: 2px; border-radius: 2px; animation: rainFall linear infinite; z-index: 0; }
        @keyframes rainFall { 0% { transform: translateY(-50px); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }

    </style>
</head>
<body>

    <div id="entry-screen">
        <div id="face-id-container" onclick="startUnlockSequence()">
            <svg id="face-id-icon" viewBox="0 0 100 100"><path d="M 30,20 Q 20,20 20,30 L 20,40 M 70,20 Q 80,20 80,30 L 80,40 M 20,60 L 20,70 Q 20,80 30,80 M 80,60 L 80,70 Q 80,80 70,80" /><path d="M 40,40 L 40,50 M 60,40 L 60,50" /><path d="M 50,45 L 50,60 M 40,65 Q 50,75 60,65" /></svg>
            <svg id="scan-spinner" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" /></svg>
            <svg id="apple-tick" viewBox="0 0 100 100"><path class="tick-path" id="tick-mark" d="M 25,50 L 45,70 L 75,30" /></svg>
        </div>
        <div id="instruction-text">Tap to Scan Face ID</div>
        <div id="terminal-logs"></div>
    </div>

    <div id="main-world">
        <div id="heart-pool"></div>
        <div id="photo-pool"></div>
        <div id="menu-trigger" onclick="toggleMagicMenu()"><span id="trigger-icon">✉️</span></div>
    </div>

    <div id="magic-menu-overlay">
        <div class="magic-title">Love Recipe Guide</div>
        <div class="wheel-wrapper">
            <div class="wheel-container" id="wheel-spin-box">
                <div id="home-btn" onclick="toggleMagicMenu()">🏠</div>
                <div class="wheel-item" style="--i:0;"><div class="item-inner" onclick="handleItemClick('Love in Every Tongue')"><div class="wheel-icon">🌍</div><div class="wheel-label">Love in Every Tongue</div></div></div>
                <div class="wheel-item" style="--i:1;"><div class="item-inner" onclick="handleItemClick('I will stop loving you-')"><div class="wheel-icon">🛑</div><div class="wheel-label">I will stop loving you-</div></div></div>
                <div class="wheel-item" style="--i:2;"><div class="item-inner" onclick="handleItemClick('Our Chemistry')"><div class="wheel-icon">🧪</div><div class="wheel-label">Our Chemistry</div></div></div>
                <div class="wheel-item" style="--i:3;"><div class="item-inner" onclick="handleItemClick('A Letter for You')"><div class="wheel-icon">💌</div><div class="wheel-label">A Letter for You</div></div></div>
                <div class="wheel-item" style="--i:4;"><div class="item-inner" onclick="handleItemClick('Us Since')"><div class="wheel-icon">⏳</div><div class="wheel-label">Us Since</div></div></div>
                <div class="wheel-item" style="--i:5;"><div class="item-inner" onclick="handleItemClick('Make a Wish')"><div class="wheel-icon">🕯️</div><div class="wheel-label">Make a Wish</div></div></div>
                <div class="wheel-item" style="--i:6;"><div class="item-inner" onclick="handleItemClick('Proposal')"><div class="wheel-icon">💍</div><div class="wheel-label">Proposal</div></div></div>
            </div>
        </div>
        <div class="swipe-hint">&lt; SWIPE TO SPIN &gt;</div>
    </div>

    <div id="section-modal">
        <div id="effect-container"></div>
        <div class="modal-box">
            <div class="modal-close" onclick="closeSectionModal()">×</div>
            <div class="modal-header" id="modal-title">Title Here</div>
            <div class="modal-content" id="modal-body"></div>
        </div>
    </div>

    <script>
        let isScanning = false, usSinceInterval, fireworksInterval, effectInterval;

        function startUnlockSequence() {
            if(isScanning) return; isScanning = true;
            document.getElementById('instruction-text').innerText = "Scanning...";
            document.getElementById('scan-spinner').style.display = 'block';
            const logBox = document.getElementById('terminal-logs'); let logIndex = 0;
            const hackLogs = ["> Analyzing DNA...", "> Consulting Stars...", "> Hacking Ahrnav's mind...", "> Stole data from NASA...", `<div style="text-align: center; font-size: 1.8rem; color: #ff4d85;">Welcome Lovleen</div>`];
            const logInterval = setInterval(() => {
                if (logIndex < hackLogs.length) {
                    logBox.innerHTML += hackLogs[logIndex] + "<br>"; logIndex++;
                } else { clearInterval(logInterval); setTimeout(showGreenTick, 1500); }
            }, 1200); 
        }

        function showGreenTick() {
            document.getElementById('scan-spinner').style.display = 'none'; document.getElementById('instruction-text').innerText = "Access Granted.";
            document.getElementById('apple-tick').style.display = 'block';
            gsap.to("#tick-mark", { strokeDashoffset: 0, duration: 0.6, onComplete: () => setTimeout(launchWorld, 1000) });
        }

        function launchWorld() {
            gsap.to("#entry-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('entry-screen').style.display = 'none'; document.getElementById('main-world').style.display = 'block';
                gsap.to("#main-world", { opacity: 1, duration: 1 }); spawnHearts(); spawnFishes();
            }});
        }

        function toggleMagicMenu() {
            const triggerBtn = document.getElementById('menu-trigger'), overlay = document.getElementById('magic-menu-overlay'), wheel = document.getElementById('wheel-spin-box');
            if(!overlay.style.display || overlay.style.display === 'none') {
                document.getElementById('trigger-icon').innerText = "💌"; overlay.style.display = 'block';
                gsap.to(overlay, { opacity: 1, duration: 0.5 });
                gsap.fromTo(wheel, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.2)" });
            } else {
                document.getElementById('trigger-icon').innerText = "✉️";
                gsap.to(overlay, { opacity: 0, duration: 0.4, onComplete: () => overlay.style.display = 'none' });
            }
        }

        let touchStartX = 0, currentRot = 0;
        document.getElementById('magic-menu-overlay').addEventListener('touchstart', e => touchStartX = e.changedTouches[0].clientX);
        document.getElementById('magic-menu-overlay').addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - touchStartX;
            if(Math.abs(diff) > 40) { currentRot += (diff < 0 ? -51.428 : 51.428); gsap.to("#wheel-spin-box", { rotation: currentRot, duration: 0.5 }); gsap.to(".item-inner", { rotation: -currentRot, duration: 0.5 }); }
        });

        function updateClock() {
            if(!document.getElementById('t-y')) return; 
            const start = new Date('2023-04-05T00:00:00');
            const now = new Date();
            const diffMs = now.getTime() - start.getTime();
            
            const totalSeconds = Math.floor(diffMs / 1000);
            const totalMinutes = Math.floor(diffMs / (1000 * 60));
            const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
            const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);
            
            let totalMonths = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
            if (now.getDate() < start.getDate()) { totalMonths--; }
            let totalYears = now.getFullYear() - start.getFullYear();
            if (now.getMonth() < start.getMonth() || (now.getMonth() === start.getMonth() && now.getDate() < start.getDate())) { totalYears--; }

            const formatStr = (num) => num.toLocaleString('en-US');

        }

        function startRain() { effectInterval = setInterval(() => { const d = document.createElement('div'); d.className = 'raindrop'; d.style.left = Math.random()*100+'vw'; d.style.animationDuration = Math.random()*0.5+0.5+'s'; document.getElementById('effect-container').appendChild(d); setTimeout(()=>d.remove(), 1000); }, 50); }
        function startRealPetals() { const types = [{bg:'radial-gradient(ellipse at bottom, #ff4d85, #ff0040)', r:'50% 0 50% 50%', w:'18px', h:'22px'}, {bg:'radial-gradient(ellipse at top, #ffb3c6, #ff7eb3)', r:'50% 50% 50% 0', w:'15px', h:'20px'}, {bg:'linear-gradient(135deg, #f7d77b, #d4a737)', r:'0 50% 0 50%', w:'12px', h:'25px'}]; effectInterval = setInterval(() => { const p = document.createElement('div'); p.className = 'real-petal'; const t = types[Math.floor(Math.random()*types.length)]; p.style.background=t.bg; p.style.borderRadius=t.r; p.style.width=t.w; p.style.height=t.h; p.style.left=Math.random()*100+'vw'; p.style.animationDuration=Math.random()*4+4+'s'; p.style.setProperty('--drift', (Math.random()>0.5?1:-1)*(Math.random()*100+50)+'px'); document.getElementById('effect-container').appendChild(p); setTimeout(()=>p.remove(), 9000); }, 250); }
        function stopEffects() { clearInterval(effectInterval); document.getElementById('effect-container').innerHTML = ''; }
        function launchFireworks() { fireworksInterval = setInterval(() => { confetti({ particleCount: 50, origin: { x: Math.random(), y: Math.random() - 0.2 } }); }, 250); }
        function spawnHearts() { for(let i=0; i<15; i++) { const h = document.createElement('div'); h.className='heart-wrapper'; h.style.left=Math.random()*100+'vw'; h.innerHTML='<div class="heart-inner"><svg class="heart-svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>'; document.getElementById('heart-pool').appendChild(h); } }
        function spawnFishes() { for(let i=1; i<=15; i++) { const r = document.createElement('div'); r.className='photo-rise'; r.style.left=Math.random()*80+'vw'; r.innerHTML=`<div class="photo-wobble"><div class="photo-bubble"><img src="photo1-${i}.jpg" onload="this.style.opacity=1"></div></div>`; document.getElementById('photo-pool').appendChild(r); } }
    </script>
</body>
</html>
