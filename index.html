<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; font-family: 'Poppins', sans-serif;
            overflow: hidden; position: relative; color: white;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        /* 🔒 1. ENTRY SCREEN */
        #entry-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #face-id-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #face-id-icon { width: 80px; height: 80px; stroke: #ff4d85; fill: none; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.6)); transition: opacity 0.3s; }
        #scan-spinner { position: absolute; inset: 0; width: 120px; height: 120px; animation: spin 1s linear infinite; display: none; }
        #scan-spinner circle { fill: none; stroke: rgba(255, 77, 133, 0.8); stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 50; stroke-linecap: round; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #apple-tick { position: absolute; width: 80px; height: 80px; display: none; }
        .tick-path { fill: none; stroke: #4cd964; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 10px #4cd964); }
        #instruction-text { margin-top: 25px; color: #ff4d85; font-size: 1.2rem; font-weight: 600; text-align: center; }
        #terminal-logs { margin-top: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #00ff00; width: 85%; max-width: 350px; text-align: left; height: 160px; overflow: hidden; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5); line-height: 1.5; }

        /* 🌊 2. MAIN WORLD */
        #main-world { display: none; opacity: 0; background: url('Background.jpg') no-repeat center center fixed; background-size: cover; width: 100vw; height: 100vh; position: relative; }
        #heart-pool { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
        .heart-wrapper { position: absolute; bottom: -50px; will-change: transform; animation: floatHeartUp linear infinite; }
        .heart-inner { width: 100%; height: 100%; will-change: transform; animation: swayHeart ease-in-out infinite alternate; }
        .heart-svg { width: 100%; height: 100%; fill: url(#redGradient); filter: drop-shadow(0 5px 10px rgba(255, 0, 64, 0.5)); }
        @keyframes floatHeartUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-110vh) scale(1.2); opacity: 0; } }
        @keyframes swayHeart { 0% { transform: translateX(-20px) rotate(-15deg); } 100% { transform: translateX(20px) rotate(15deg); } }

        /* 📸 SOAP BUBBLES */
        #photo-pool { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
        .photo-rise { position: absolute; bottom: -150px; will-change: transform; animation: riseFromBottom linear infinite; }
        .photo-wobble { width: 110px; height: 110px; will-change: transform; animation: bobbingX ease-in-out infinite alternate; }
        .photo-bubble { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid rgba(255, 255, 255, 0.6); box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.6), inset 10px 0 30px rgba(255, 77, 133, 0.3), inset -10px 0 30px rgba(0, 255, 255, 0.3), 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        .photo-bubble img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .photo-bubble::after { content: ''; position: absolute; top: 5%; left: 15%; width: 40%; height: 25%; border-radius: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent); transform: rotate(-30deg); z-index: 2; pointer-events: none; }
        @keyframes riseFromBottom { 100% { transform: translateY(-125vh); } }
        @keyframes bobbingX { 0% { transform: translateX(-15px); } 100% { transform: translateX(15px); } }

        /* 💌 3. THE GOLDEN SHINY TRIGGER (TOP-LEFT) */
        #menu-trigger {
            position: fixed; top: 40px; left: 30px; font-size: 3rem; z-index: 500;
            cursor: pointer;
            /* Applying Gold Style and Bold directly on text fill */
            font-weight: bold;
            color: transparent;
            background: linear-gradient(145deg, #f7d77b 0%, #d4a737 40%, #f7d77b 60%, #b38e2f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            
            /* Shine Effect Aura */
            filter: drop-shadow(0 0 15px rgba(212, 167, 55, 0.9));
            
            /* Strong Vibe Animation */
            animation: strongVibe 0.5s infinite linear;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Prominent Shine Layer - overlays trigger to add reflective gleam */
        #menu-trigger::after {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 40%, rgba(255,255,255,0.4) 60%, transparent 100%);
            animation: shine 5s infinite linear; pointer-events: none; z-index: -1;
        }

        @keyframes strongVibe {
            0%, 100% { transform: scale(1) translate(0, 0); }
            10% { transform: translate(-3px, 1px) rotate(-2deg); }
            20% { transform: translate(1px, -2px) rotate(1deg); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(3px, -1px); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            60% { transform: translate(2px, 3px); }
            70% { transform: translate(-3px, 1px) rotate(2deg); }
            80% { transform: translate(2px, -1px) rotate(-1deg); }
            90% { transform: translate(-1px, 2px); }
        }
        @keyframes shine { 100% { transform: rotate(360deg); } }

        /* 🎡 4. THE MAGIC WHEEL (GOLDEN EDITION) */
        #magic-menu-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            z-index: 400; display: none; opacity: 0; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        .magic-title {
            font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ffebf0;
            text-shadow: 0 0 25px rgba(255, 77, 133, 0.6), 0 2px 5px rgba(212, 167, 55, 0.7); /* PINK + GOLD GLOW */
            margin-bottom: 20px; text-align: center;
            position: absolute; top: 10%;
        }
        
        .swipe-hint {
            position: absolute; bottom: 8%; font-size: 0.95rem; color: rgba(255,255,255,0.6);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* Golden Decorated Wheel Container */
        .wheel-container {
            position: relative; width: 320px; height: 320px;
            border-radius: 50%; border: 2px dashed rgba(212, 167, 55, 0.4); /* GOLD BORDER */
            box-shadow: inset 0 0 60px rgba(212, 167, 55, 0.2), 0 0 30px rgba(0,0,0,0.5); /* GOLD INNER GLOW */
            display: flex; justify-content: center; align-items: center;
            /* Functional Animation: Wheel rotates */
            animation: wheelRotate 20s infinite linear;
        }
        @keyframes wheelRotate { 100% { transform: rotate(360deg); } }

        .wheel-item {
            position: absolute; width: 110px; text-align: center;
            /* Circular placement. Items rotate in place opposite of wheel to stay upright */
            transform: rotate(calc(60deg * var(--i))) translateY(-160px) rotate(calc(-60deg * var(--i)));
            z-index: 2;
        }

        /* Inner container that counter-rotates when wheel spins (not used for this simple rotation) */
        .item-inner {
            cursor: pointer; transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .item-inner:active { transform: scale(0.9) !important; }

        .wheel-icon {
            font-size: 2.2rem; background: rgba(212,167,55,0.05); width: 70px; height: 70px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto; box-shadow: 0 0 20px rgba(212, 167, 55, 0.3);
            border: 2px solid rgba(212, 167, 55, 0.5); /* GOLD ACCENT */
            position: relative; overflow: visible; /* Allows animations to leak out */
        }

        /* 👑 Gold Styled & Handwritten Labels */
        .wheel-label {
            font-family: 'Dancing Script', cursive; font-size: 1.3rem;
            color: #f7d77b; /* Pure Gold Color */
            margin-top: 10px; text-shadow: 0 0 10px rgba(212, 167, 55, 0.4);
            line-height: 1.1; font-weight: bold;
        }

        /* Functional (Animated) Emoji Effects */
        
        /* 🌍 Globe spins smoothly */
        .globe-icon { animation: spinGlobe 10s infinite linear; display: inline-block; }
        @keyframes spinGlobe { 100% { transform: rotate(360deg); } }
        
        /* ♾️ Infinity pulses gently */
        .infinity-icon { animation: pulseInfinity 2s infinite ease-in-out; display: inline-block; }
        @keyframes pulseInfinity { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.9; } }
        
        /* 🧪 Chemistry Bubbles rise *inside* beaker */
        .chemistry-beaker { position: relative; overflow: hidden; height: 100%; width: 100%; border-radius: 50%; }
        .chemistry-bubbles { position: absolute; inset: 0; }
        .chemistry-bubbles::before, .chemistry-bubbles::after {
            content: '🫧'; position: absolute; font-size: 1.2rem;
            bottom: -30px; animation: riseBubble infinite linear; opacity: 0;
        }
        .chemistry-bubbles::before { left: 25%; animation-duration: 4s; animation-delay: 1s; }
        .chemistry-bubbles::after { left: 60%; animation-duration: 3s; animation-delay: 2s; }
        @keyframes riseBubble { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        
        /* 💌 Letter glows subtly */
        .letter-glow { animation: glowPulse 3s infinite ease-in-out; display: inline-block; }
        @keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 77, 133, 0.4)); opacity: 1; } 50% { filter: drop-shadow(0 0 15px rgba(255, 77, 133, 0.8)); opacity: 0.9; } }
        
        /* ⏳ Hourglass ticks/sways gently */
        .hourglass-icon { animation: tickTock 3s infinite ease-in-out; display: inline-block; }
        @keyframes tickTock { 0%, 100% { transform: rotate(-5deg) translateY(0); } 50% { transform: rotate(5deg) translateY(-3px); } }
        
        /* 🕯️ Custom Flickering Flame SVG */
        .candle-container { position: relative; width: 30px; height: 50px; }
        .candle-wick { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 15px; background: #555; border-radius: 2px; }
        .candle-flame { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%) scale(1); width: 20px; height: 25px; 
            background: radial-gradient(circle, #f7d77b 10%, #ff4d85 70%, transparent 100%); 
            border-radius: 50% 50% 20% 20%; 
            filter: drop-shadow(0 0 8px rgba(212, 167, 55, 0.7));
            animation: flickerFlame 0.15s infinite; 
            transform-origin: bottom center;
        }
        @keyframes flickerFlame { 
            0%, 100% { transform: translateX(-50%) scale(1) rotate(-1deg); opacity: 0.95; } 
            25% { transform: translateX(-50%) scale(1.02) rotate(1deg); opacity: 1; } 
            50% { transform: translateX(-51%) scale(0.98) rotate(0deg); opacity: 0.93; } 
            75% { transform: translateX(-49%) scale(1.01) rotate(-0.5deg); opacity: 0.97; } 
        }

    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4d4d; stop-opacity:1" /><stop offset="50%" style="stop-color:#ff0040; stop-opacity:1" /><stop offset="100%" style="stop-color:#b3002d; stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <div id="entry-screen">
        <div id="face-id-container" onclick="startUnlockSequence()">
            <svg id="face-id-icon" viewBox="0 0 100 100">
                <path d="M 30,20 Q 20,20 20,30 L 20,40 M 70,20 Q 80,20 80,30 L 80,40 M 20,60 L 20,70 Q 20,80 30,80 M 80,60 L 80,70 Q 80,80 70,80" /><path d="M 40,40 L 40,50 M 60,40 L 60,50" /><path d="M 50,45 L 50,60 M 40,65 Q 50,75 60,65" />
            </svg>
            <svg id="scan-spinner" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" /></svg>
            <svg id="apple-tick" viewBox="0 0 100 100"><path class="tick-path" id="tick-mark" d="M 25,50 L 45,70 L 75,30" /></svg>
        </div>
        <div id="instruction-text">Tap to Scan Face ID</div>
        <div id="terminal-logs"></div>
    </div>

    <div id="main-world">
        <div id="heart-pool"></div>
        <div id="photo-pool"></div>
        
        <div id="menu-trigger" onclick="toggleMagicMenu()">✉️</div>
    </div>

    <div id="magic-menu-overlay">
        <div class="magic-title">Love Recipe Guide</div>
        
        <div class="wheel-container" id="wheel-spin-box">
            <div class="wheel-item" style="--i:0;">
                <div class="item-inner" onclick="handleItemClick('Love in Every Tongue')">
                    <div class="wheel-icon globe-icon">🌍</div><div class="wheel-label">Love in Every Tongue</div>
                </div>
            </div>
            <div class="wheel-item" style="--i:1;">
                <div class="item-inner" onclick="handleItemClick('Never Conditions')">
                    <div class="wheel-icon infinity-icon">♾️</div><div class="wheel-label">Never Conditions</div>
                </div>
            </div>
            <div class="wheel-item" style="--i:2;">
                <div class="item-inner" onclick="handleItemClick('Our Chemistry')">
                    <div class="wheel-icon">
                        <div class="chemistry-beaker">
                            <span style="font-size:2.2rem;">🧪</span>
                            <div class="chemistry-bubbles"></div>
                        </div>
                    </div><div class="wheel-label">Our Chemistry</div>
                </div>
            </div>
            <div class="wheel-item" style="--i:3;">
                <div class="item-inner" onclick="handleItemClick('A Letter for You\n\nTitle: The Magic Inside You 🎀')">
                    <div class="wheel-icon letter-glow">💌</div><div class="wheel-label">A Letter for You</div>
                </div>
            </div>
            <div class="wheel-item" style="--i:4;">
                <div class="item-inner" onclick="handleItemClick('Us Since')">
                    <div class="wheel-icon hourglass-icon">⏳</div><div class="wheel-label">Us Since</div>
                </div>
            </div>
            <div class="wheel-item" style="--i:5;">
                <div class="item-inner" onclick="handleItemClick('Make a Wish')">
                    <div class="wheel-icon">
                        <div class="candle-container">
                            <div class="candle-wick"></div>
                            <div class="candle-flame"></div>
                        </div>
                    </div><div class="wheel-label">Make a Wish</div>
                </div>
            </div>
        </div>

        <div class="swipe-hint">< Swipe to Spin ></div>
    </div>

    <script>
        const hackLogs = ["> Running DNA analysis...", "> Consulting Elon Musk...", "> Verifying Ahrnav’s haemoglobin...", "> Peeking Ahrnav’s heart...", "> Calling Stephen Hawking...", "> Hacking Ahrnav's mind...", "> Stole data from NASA...", "> Missed call rcvd from Jaadu...", "> Using Doraemon’s gadget...", `<div style="text-align: center; font-size: 1.8rem; color: #ff4d85; text-shadow: 0 0 15px #ff4d85; margin-top: 15px; font-weight: bold; font-family: 'Poppins', sans-serif;">Welcome Lovleen</div>`];
        let isScanning = false;

        function startUnlockSequence() {
            if(isScanning) return; isScanning = true;
            document.getElementById('instruction-text').innerText = "Scanning...";
            document.getElementById('face-id-icon').style.opacity = '0.3'; 
            document.getElementById('scan-spinner').style.display = 'block';
            const logBox = document.getElementById('terminal-logs');
            logBox.innerHTML = ""; let logIndex = 0;
            const logInterval = setInterval(() => {
                if (logIndex < hackLogs.length) {
                    logBox.innerHTML += hackLogs[logIndex] + "<br>"; logBox.scrollTop = logBox.scrollHeight;
                    if (logIndex === hackLogs.length - 1) { confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff4d85', '#00ff00', '#ffffff'], zIndex: 9999 }); }
                    logIndex++;
                } else { clearInterval(logInterval); setTimeout(showGreenTick, 1500); }
            }, 1200); 
        }

        function showGreenTick() {
            document.getElementById('face-id-icon').style.display = 'none'; document.getElementById('scan-spinner').style.display = 'none';
            document.getElementById('instruction-text').innerText = "Access Granted."; document.getElementById('instruction-text').style.color = "#4cd964";
            const tickSvg = document.getElementById('apple-tick'); tickSvg.style.display = 'block';
            gsap.to("#tick-mark", { strokeDashoffset: 0, duration: 0.6, ease: "power2.out", onComplete: () => { setTimeout(launchWorld, 1000); } });
        }

        function launchWorld() {
            gsap.to("#entry-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('entry-screen').style.display = 'none';
                const world = document.getElementById('main-world'); world.style.display = 'block';
                gsap.to(world, { opacity: 1, duration: 1 });
                spawnHearts(); spawnFishes();
            }});
        }

        /* 🎡 WHEEL MENU TOGGLE, SPIN & FUNCTIONAL MAGIC */
        let menuOpen = false;
        let currentRot = 0;

        function toggleMagicMenu() {
            const trigger = document.getElementById('menu-trigger');
            const overlay = document.getElementById('magic-menu-overlay');
            const wheel = document.getElementById('wheel-spin-box');

            if(!menuOpen) {
                // Morph to Open Heart Envelope and styling change
                trigger.innerText = "💌"; trigger.style.animation = "none"; // Stop strong vibe for opening
                
                // --- NEW POP EFFECT FOR LETTER ---
                gsap.fromTo(trigger, {scale: 1.3}, {scale: 1, duration: 0.3, ease: "elastic.out(1, 0.3)"});
                
                overlay.style.display = 'flex';
                gsap.to(overlay, { opacity: 1, duration: 0.5 });
                
                // Reset wheel rotation on open
                currentRot = 0;
                gsap.set(wheel, { rotation: currentRot });
                
                // Scale in the main decorated wheel
                gsap.fromTo(wheel, { scale: 0.5 }, { scale: 1, duration: 0.8, ease: "back.out(1.2)" });
                
                // After back.out, enable continuous functional rotation
                gsap.to(wheel, { rotation: 360, duration: 20, ease: "linear", repeat: -1 });

                menuOpen = true;
            } else {
                // Morph back to closed vibrating envelope
                trigger.innerText = "✉️"; trigger.style.animation = "strongVibe 0.5s infinite linear";
                
                gsap.killTweensOf(wheel); // Stop continuous rotation
                gsap.to(overlay, { opacity: 0, duration: 0.5, onComplete: () => { overlay.style.display = 'none'; }});
                menuOpen = false;
            }
        }

        /* 👆 SWIPE TO SPIN LOGIC (SAME) */
        let touchStartX = 0;
        let isSwiping = false;
        const overlay = document.getElementById('magic-menu-overlay');

        overlay.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].clientX; 
            isSwiping = false; 
        });
        overlay.addEventListener('touchmove', e => { 
            isSwiping = true; // Mark as swipe to prevent click
        });
        overlay.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].clientX;
            let diff = touchEndX - touchStartX;
            if(Math.abs(diff) > 40) {
                if(diff < 0) rotateWheel(-60); // Swipe Left
                else rotateWheel(60);          // Swipe Right
            }
        });

        function rotateWheel(deg) {
            // Kill existing continuous rotation tweak
            gsap.killTweensOf("#wheel-spin-box");
            currentRot += deg;
            gsap.to("#wheel-spin-box", { rotation: currentRot, duration: 0.6, ease: "power2.out" });
            
            // Resume continuous rotation after swipe delay
            gsap.delayedCall(2, () => {
                gsap.to("#wheel-spin-box", { rotation: "+=360", duration: 20, ease: "linear", repeat: -1 });
            });
        }

        /* CLICK HANDLER */
        function handleItemClick(sectionName) {
            if(isSwiping) return; // Don't trigger if user was just spinning the wheel
            alert('Opening Section: ' + sectionName);
            // Yahan hum baad mein exact section kholne ka code dalenge
        }

        /* BACKGROUND ELEMENTS */
        function spawnHearts() {
            const hp = document.getElementById('heart-pool'); const heartPath = "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";
            for(let i=0; i<25; i++) { 
                const wrapper = document.createElement('div'); wrapper.className = 'heart-wrapper'; wrapper.style.left = Math.random() * 95 + 'vw';
                wrapper.style.animationDuration = (Math.random() * 8 + 6) + 's'; wrapper.style.animationDelay = (Math.random() * -10) + 's';
                const inner = document.createElement('div'); inner.className = 'heart-inner'; inner.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
                let s = Math.random() * 15 + 15; wrapper.style.width = wrapper.style.height = s + 'px';
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"); svg.setAttribute("viewBox", "0 0 24 24"); svg.setAttribute("class", "heart-svg");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.setAttribute("d", heartPath);
                svg.appendChild(path); inner.appendChild(svg); wrapper.appendChild(inner); hp.appendChild(wrapper);
            }
        }

        function spawnFishes() {
            const pp = document.getElementById('photo-pool');
            for(let i=1; i<=15; i++) {
                const riseWrap = document.createElement('div'); riseWrap.className = 'photo-rise';
                riseWrap.style.left = 'calc(' + (Math.random() * 60 + 20) + 'vw - 55px)'; 
                riseWrap.style.animationDuration = (Math.random() * 8 + 10) + 's'; riseWrap.style.animationDelay = (Math.random() * -20) + 's';
                const wobbleWrap = document.createElement('div'); wobbleWrap.className = 'photo-wobble';
                wobbleWrap.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
                const pBubble = document.createElement('div'); pBubble.className = 'photo-bubble';
                const img = document.createElement('img'); img.src = `photo1-${i}.jpg`; 
                img.onerror = function() { riseWrap.style.display = 'none'; };
                pBubble.appendChild(img); wobbleWrap.appendChild(pBubble); riseWrap.appendChild(wobbleWrap); pp.appendChild(riseWrap);
            }
        }
    </script>
</body>
</html>
