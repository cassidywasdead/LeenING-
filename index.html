<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You Leenie ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('Background.jpg') no-repeat center center fixed;
            background-color: #ffb6c1; 
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 1;
        }

        /* === Blimp === */
        .airship-container {
            position: fixed;
            top: 60px;
            left: -500px; 
            display: flex;
            align-items: center;
            z-index: 10;
            animation: flyAcross 25s linear infinite;
            will-change: transform;
        }

        .blimp {
            position: relative;
            width: 80px;
            height: 45px;
            background: linear-gradient(to bottom, #ff4d4d, #cc0000);
            border-radius: 50px; 
            border: 2px solid #333;
            z-index: 2;
        }

        .blimp::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 8px;
            background: #fff;
            transform: translateY(-50%);
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .blimp::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 12px;
            background: #8b5a2b;
            border: 2px solid #333;
            border-radius: 3px;
        }

        .banner {
            font-family: 'Dancing Script', cursive;
            background-color: white;
            color: #d81b60;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 20px; 
            white-space: nowrap; 
            position: relative;
        }

        .banner::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            border-right: 20px solid white;
            height: 10px;
        }

        @keyframes flyAcross {
            0% { transform: translateX(-500px); }
            100% { transform: translateX(100vw); }
        }

        /* === Main Container === */
        .main-container {
            position: relative;
            z-index: 5; 
            text-align: center;
            background: rgba(255, 255, 255, 0.1); 
            padding: 25px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; 
            width: 90%;
            max-width: 350px; 
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #ff4d85; 
            margin-bottom: 5px;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }

        p.subtitle {
            font-size: 1rem;
            margin-bottom: 25px;
            color: white;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .compact-counter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px; 
            justify-content: center;
        }

        .count-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 8px;
            border-radius: 12px;
            min-width: 60px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .count-box span.num {
            display: block;
            font-weight: 700;
            font-size: 1.5rem; 
            color: #e91e63; 
        }

        .count-box span.unit {
            display: block;
            font-size: 0.7rem; 
            color: #555; 
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .count-box .emoji {
            font-size: 0.8rem;
        }

        .heart {
            font-size: 3rem;
            color: #e91e63;
            animation: beat 0.8s infinite alternate;
            margin-top: 20px;
            display: inline-block;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* === Swimming Fish Photos (Updated) === */
        #photo-pool {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2; 
            overflow: hidden;
            pointer-events: none; 
        }

        .swimming-photo {
            position: absolute;
            /* Size Reduced Significantly (about 25% smaller and sleeker) */
            width: 75px; 
            height: 55px;
            left: 0; 
            overflow: hidden; /* Photo bounds outside shape */
            
            /* Apply SVG Fish Shape (defined below in body) */
            clip-path: url(#fishShape);
            -webkit-clip-path: url(#fishShape); /* For Safari/iOS compatibility */
            
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: swim 20s linear infinite;
            will-change: transform;
        }

        .swimming-photo img {
            width: 100%; 
            height: 100%;
            object-fit: cover; /* Centers faces perfectly in the wide body section */
            object-position: center;
        }

        @keyframes swim {
            0% { transform: translate(-150px, 0px); }
            25% { transform: translate(25vw, 40px); }
            50% { transform: translate(50vw, -40px); }
            75% { transform: translate(75vw, 20px); }
            100% { transform: translate(110vw, 0px); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <svg width="0" height="0">
        <defs>
            <clipPath id="fishShape" clipPathUnits="objectBoundingBox">
                <path d="M0,0.5 C0.05,0.2, 0.25,0, 0.5,0 C0.85,0, 1,0.25, 1,0.5 C1,0.75, 0.85,1, 0.5,1 C0.25,1, 0.05,0.8, 0,0.5 Z 
                         M0.92,0.5 L1,0.35 L1,0.65 Z"></path>
            </clipPath>
        </defs>
    </svg>

    <div class="airship-container">
        <div class="blimp"></div>
        <div class="banner">welcome My leenie babyyy on our special day</div>
    </div>

    <div class="main-container">
        <h1>Days I Fell For You</h1>
        <p class="subtitle">Every moment with you counts...</p>

        <div class="compact-counter">
            <div class="count-box">
                <span class="num" id="val-years">0</span>
                <span class="unit">years <span class="emoji">✨</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-months">0</span>
                <span class="unit">months <span class="emoji">🫧</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-weeks">0</span>
                <span class="unit">weeks <span class="emoji">🌷</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-days">0</span>
                <span class="unit">days <span class="emoji">🪶</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-hours">0</span>
                <span class="unit">hours <span class="emoji">☘️</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-mins">0</span>
                <span class="unit">minutes <span class="emoji">👀</span></span>
            </div>
            <div class="count-box">
                <span class="num" id="val-secs">0</span>
                <span class="unit">seconds <span class="emoji">⏱️</span></span>
            </div>
        </div>

        <div class="heart">❤️</div>
    </div>

    <div id="photo-pool"></div>

    <script>
        const startDate = new Date(2023, 3, 5, 15, 0, 0); 

        function updateCounter() {
            const now = new Date();
            const difference = now.getTime() - startDate.getTime();

            const totalSeconds = Math.floor(difference / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);
            const totalWeeks = Math.floor(totalDays / 7);
            
            let totalMonths = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            if (now.getDate() < startDate.getDate() || (now.getDate() === startDate.getDate() && now.getHours() < startDate.getHours())) {
                totalMonths--;
            }
            
            const totalYears = Math.floor(totalMonths / 12);

            document.getElementById("val-years").innerText = totalYears.toLocaleString('en-US');
            document.getElementById("val-months").innerText = totalMonths.toLocaleString('en-US');
            document.getElementById("val-weeks").innerText = totalWeeks.toLocaleString('en-US');
            document.getElementById("val-days").innerText = totalDays.toLocaleString('en-US');
            document.getElementById("val-hours").innerText = totalHours.toLocaleString('en-US');
            document.getElementById("val-mins").innerText = totalMinutes.toLocaleString('en-US');
            document.getElementById("val-secs").innerText = totalSeconds.toLocaleString('en-US');
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        const photos = [
            'photo1-1.jpg', 'photo1-2.jpg', 'photo1-3.jpg', 'photo1-4.jpg', 'photo1-5.jpg',
            'photo1-6.png', 'photo1-7.jpg', 'photo1-8.jpg', 'photo1-9.jpg', 'photo1-10.jpg',
            'photo1-11.jpg', 'photo1-12.jpg', 'photo1-13.jpg', 'photo1-14.jpg', 'photo1-15.jpg'
        ];

        const photoPool = document.getElementById('photo-pool');

        for (let i = 0; i < 15; i++) {
            const photoEl = document.createElement('div');
            photoEl.className = 'swimming-photo';
            
            const randomTop = Math.random() * 80 + 5; 
            photoEl.style.top = randomTop + 'vh';
            
            const randomDuration = Math.random() * 20 + 15; 
            photoEl.style.animationDuration = randomDuration + 's';
            
            const randomDelay = Math.random() * -30; 
            photoEl.style.animationDelay = randomDelay + 's';

            const imgEl = document.createElement('img');
            imgEl.src = photos[i];
            
            imgEl.onerror = function() {
                this.style.display = 'none';
                photoEl.style.background = 'transparent';
                photoEl.style.clipPath = 'none'; /* Remove fish shape if image breaks */
            };

            photoEl.appendChild(imgEl);
            photoPool.appendChild(photoEl);
        }
    </script>
</body>
</html>
