<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            /* Based on your background/bokeh context */
            background: #0a0a0a; /* Dark base for cosmic effect */
            background-image: radial-gradient(circle at center, rgba(147, 51, 234, 0.1) 0%, #0a0a0a 70%); /* Cosmic purple bokeh base */
            font-family: 'Poppins', sans-serif;
            overflow: hidden; position: relative; color: white;
        }

        /* 🎀 Welcome Ribbon Overlay - Optional entry if needed, but going straight to FP as requested */
        /* Since we are doing only FP entry and pool unlock, we remove previous Ribbon CSS */

        /* 🔒 1. Entry / Fingerprint Screen */
        #entry-screen {
            position: fixed; inset: 0; background: #0a0a0a;
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        /* Modern Aesthetic Buffer Circle (Spinner) Container */
        #entry-button-container {
            position: relative; width: 140px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Glowing Neon Pink Fingerprint Icon */
        .fingerprint-icon {
            width: 80px; height: 80px; 
            font-size: 3rem; color: #ff4d85;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #ff4d85; border-radius: 50%;
            filter: drop-shadow(0 0 15px rgba(255, 77, 133, 0.6));
            position: absolute; z-index: 10;
        }

        /* Modern Buffer Circle (SVG Spinner) - Set to hide, reveals on hold */
        #circ-loading {
            position: absolute; inset: 0; transform: rotate(-90deg);
            display: none; /* Revealed on hold */
        }
        #circ-loading circle {
            fill: none; stroke-width: 6; stroke-linecap: round;
        }
        .circ-track { stroke: rgba(255, 77, 133, 0.2); }
        .circ-fill {
            stroke: #ff4d85;
            stroke-dasharray: 440; /* 2 * PI * 70 (approx. container size inner radius) */
            stroke-dashoffset: 440; /* Full offset to start empty */
            filter: drop-shadow(0 0 10px #ff4d85);
            /* Animates dashoffset in JS on hold */
        }

        /* Simulated Apple-Style Green Tick SVG (Hidden) */
        #apple-tick-svg {
            position: absolute; inset: 0; width: 140px; height: 140px;
            display: none; /* Revealed and animated on complete */
        }
        .tick-circle {
            fill: none; stroke: none; stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 440; stroke-dashoffset: 440;
            filter: drop-shadow(0 0 15px #4cd964);
        }
        .tick-mark {
            fill: none; stroke: none; stroke-width: 8; stroke-linecap: round;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            filter: drop-shadow(0 0 10px #4cd964);
        }

        /* Entry Call to Action Text */
        #c-text { margin-top: 25px; color: white; font-size: 1.2rem; font-weight: 600; text-align: center;}
        #c-subtext { margin-top: 5px; color: rgba(255,255,255,0.7); font-size: 0.9rem; text-align: center;}

        /* Background elements during entry (Hearts/Bubbles context) */
        #hearts-bokeh-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5; }
        .falling-heart { position: absolute; top: -50px; color: #ff4d85; font-size: 1.5rem; animation: heartFall linear infinite; pointer-events: none; opacity: 0.3; }
        @keyframes heartFall { to { transform: translateY(110vh); } }

        /* 🌊 2. Main World / Pool Composition (Hidden Initially) */
        #main-world {
            display: none; opacity: 0;
            background: #0a0a0a; /* Base for standard cosmic purple background/image */
            background-image: radial-gradient(circle at center, rgba(147, 51, 234, 0.1) 0%, #0a0a0a 70%);
            width: 100vw; height: 100vh; position: relative;
        }
        /* Fish Fix: Tail left, head right, left-to-right standard movement */
        .swimming-photo {
            position: absolute; width: 130px; height: 85px; left: -150px;
            /* Clipped to bubble/fish shape bubble - No standard white boundaries */
            clip-path: url(#fishShape); 
            background: transparent; border: none; /* Removed previously complained visual artifacts boundaries */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: swim linear infinite; z-index: 10;
        }
        .swimming-photo img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes swim { 0% { transform: translateX(0); } 100% { transform: translateX(125vw); } }

        /* Bubble Elements for Background */
        .real-bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5); animation: rise infinite ease-in; pointer-events: none;}
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-110vh) scale(1.5); opacity: 0; } }

        /* Main Page Title (Calligraphic context) */
        #title-container { text-align: center; padding-top: 10vh; color: white; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ff4d85; text-shadow: 0 0 10px #000; margin: 0; }
        .subtitle { font-size: 1.2rem; font-weight: 600; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* Scope restriction: No Navigation icons/bot requested */

    </style>
</head>
<body>

    <div id="hearts-bokeh-bg"></div>

    <div id="entry-screen">
        <div id="entry-button-container" onpointerdown="startVerification()" onpointerup="stopVerification()">
            <div class="fingerprint-icon">☝️</div>
            
            <svg id="circ-loading" viewBox="0 0 150 150">
                <circle class="circ-track" cx="75" cy="75" r="70"/>
                <circle class="circ-fill" id="circ-fill" cx="75" cy="75" r="70"/>
            </svg>

            <svg id="apple-tick-svg" viewBox="0 0 150 150">
                <circle class="tick-circle" id="tick-circle" cx="75" cy="75" r="70"/>
                <path class="tick-mark" id="tick-mark" d="M40 75 L65 100 L110 50" />
            </svg>
        </div>
        <div id="c-text">Days I Fell For You</div>
        <div id="c-subtext">Touch & Hold to Unlock Arnav's Heart</div>
    </div>

    <div id="main-world">
        <div id="title-container">
            <h1>For My Leenu</h1>
            <p class="subtitle">Every moment with you counts...</p>
        </div>
        
        <div id="bubble-pool"></div>
        <div id="photo-pool"></div>
    </div>
