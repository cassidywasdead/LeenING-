<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Leenie ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; font-family: 'Poppins', sans-serif;
            overflow: hidden; position: relative; color: white;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        /* 🔒 ENTRY SCREEN */
        #entry-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #face-id-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #face-id-icon { width: 80px; height: 80px; stroke: #ff4d85; fill: none; stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.6)); transition: opacity 0.3s; }
        #scan-spinner { position: absolute; inset: 0; width: 120px; height: 120px; animation: spin 1s linear infinite; display: none; }
        #scan-spinner circle { fill: none; stroke: rgba(255, 77, 133, 0.8); stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 50; stroke-linecap: round; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #apple-tick { position: absolute; width: 80px; height: 80px; display: none; }
        .tick-path { fill: none; stroke: #4cd964; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; filter: drop-shadow(0 0 10px #4cd964); }
        #instruction-text { margin-top: 25px; color: #ff4d85; font-size: 1.2rem; font-weight: 600; text-align: center; }
        #terminal-logs { margin-top: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #00ff00; width: 85%; max-width: 350px; text-align: left; height: 160px; overflow: hidden; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5); line-height: 1.5; }

        /* 🌊 MAIN WORLD (BUBBLES & HEARTS) */
        #main-world { display: none; opacity: 0; background: url('Background.jpg') no-repeat center center fixed; background-size: cover; width: 100vw; height: 100vh; position: relative; }
        #heart-pool { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
        .heart-wrapper { position: absolute; bottom: -50px; will-change: transform; animation: floatHeartUp linear infinite; }
        .heart-inner { width: 100%; height: 100%; will-change: transform; animation: swayHeart ease-in-out infinite alternate; }
        .heart-svg { width: 100%; height: 100%; fill: url(#redGradient); filter: drop-shadow(0 5px 10px rgba(255, 0, 64, 0.5)); }
        @keyframes floatHeartUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-110vh) scale(1.2); opacity: 0; } }
        @keyframes swayHeart { 0% { transform: translateX(-20px) rotate(-15deg); } 100% { transform: translateX(20px) rotate(15deg); } }

        #photo-pool { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
        .photo-rise { position: absolute; bottom: -150px; will-change: transform; animation: riseFromBottom linear infinite; }
        .photo-wobble { width: 110px; height: 110px; will-change: transform; animation: bobbingX ease-in-out infinite alternate; }
        .photo-bubble { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid rgba(255, 255, 255, 0.6); box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.6), inset 10px 0 30px rgba(255, 77, 133, 0.3), inset -10px 0 30px rgba(0, 255, 255, 0.3), 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        .photo-bubble img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease-in-out; will-change: opacity; }
        .photo-bubble::after { content: ''; position: absolute; top: 5%; left: 15%; width: 40%; height: 25%; border-radius: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent); transform: rotate(-30deg); z-index: 2; pointer-events: none; }
        @keyframes riseFromBottom { 100% { transform: translateY(-125vh); } }
        @keyframes bobbingX { 0% { transform: translateX(-15px); } 100% { transform: translateX(15px); } }

        /* 💌 VISIBLE ENVELOPE TRIGGER */
        #menu-trigger {
            position: fixed; top: 25px; left: 25px; z-index: 500; cursor: pointer;
            width: 55px; height: 55px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #f7d77b; border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 2rem; backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(247, 215, 123, 0.5), inset 0 0 10px rgba(247, 215, 123, 0.3);
            animation: vibePulse 2s infinite ease-in-out; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease;
        }
        @keyframes vibePulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(247, 215, 123, 0.5); } 50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(247, 215, 123, 0.9); } }

        /* 🎡 MAGIC MENU OVERLAY */
        #magic-menu-overlay { position: fixed; inset: 0; background: rgba(10, 5, 5, 0.95); backdrop-filter: blur(12px); z-index: 400; display: none; opacity: 0; }
        .magic-title {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 100%;
            font-family: 'Dancing Script', cursive; font-size: 3.2rem; font-weight: bold; text-align: center; margin: 0; z-index: 10; line-height: 1.2;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #f6d365 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 4px 10px rgba(255,105,180,0.6));
        }
        .wheel-wrapper { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        .wheel-container { position: relative; width: 280px; height: 280px; border-radius: 50%; border: 2px dashed rgba(247, 215, 123, 0.4); display: flex; justify-content: center; align-items: center; }

        /* 🏠 CENTER HOME BUTTON */
        #home-btn {
            position: absolute; width: 65px; height: 65px; border-radius: 50%; background: rgba(247, 215, 123, 0.15); border: 2.5px solid #f7d77b; display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; z-index: 50; box-shadow: 0 0 25px rgba(247, 215, 123, 0.6), inset 0 0 15px rgba(247, 215, 123, 0.4); transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        #home-btn:active { transform: scale(0.85); box-shadow: 0 0 40px #f7d77b; }

        .wheel-item { position: absolute; width: 110px; text-align: center; transform: rotate(calc(60deg * var(--i))) translateY(-145px) rotate(calc(-60deg * var(--i))); z-index: 10; }
        .item-inner { cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; display: flex; flex-direction: column; align-items: center; }
        .item-inner:active { transform: scale(0.9) !important; }
        .wheel-icon { font-size: 2.2rem; background: rgba(0,0,0,0.6); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid rgba(247, 215, 123, 0.8); box-shadow: 0 0 20px rgba(255, 77, 133, 0.5); position: relative; }
        .wheel-label { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: #fff; margin-top: 6px; line-height: 1.1; font-weight: bold; text-shadow: 0 0 8px #ff4d85, 0 0 15px rgba(255, 77, 133, 0.8), 0 2px 2px rgba(0,0,0,0.9); }
        .swipe-hint { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; font-size: 0.95rem; color: #f7d77b; letter-spacing: 4px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 15px rgba(247, 215, 123, 0.8); z-index: 10; }

        /* EMOJI ANIMATIONS */
        .anim-globe { display: inline-block; animation: spinGlobe 6s linear infinite; } @keyframes spinGlobe { 100% { transform: rotate(360deg); } }
        .anim-infinity { display: inline-block; animation: pulseInf 1.5s ease-in-out infinite; } @keyframes pulseInf { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); text-shadow: 0 0 15px #fff; } }
        .anim-chem { display: inline-block; animation: wobbleChem 2s ease-in-out infinite; } @keyframes wobbleChem { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        .anim-letter { display: inline-block; animation: glowLetter 2s ease-in-out infinite; } @keyframes glowLetter { 0%, 100% { filter: drop-shadow(0 0 5px #ff4d85); } 50% { filter: drop-shadow(0 0 15px #ff4d85); transform: scale(1.05); } }
        .anim-time { display: inline-block; animation: tickTock 2s ease-in-out infinite; } @keyframes tickTock { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        .anim-candle { display: inline-block; animation: flickerCandle 0.15s infinite alternate; } @keyframes flickerCandle { 0% { transform: scale(1) skewX(1deg); filter: drop-shadow(0 0 5px #f7d77b); opacity: 0.9; } 100% { transform: scale(1.05) skewX(-1deg); filter: drop-shadow(0 0 15px #ffaa00); opacity: 1; } }

        /* 📜 DYNAMIC SECTION MODAL */
        #section-modal {
            position: fixed; inset: 0; background: rgba(5, 0, 10, 0.95); backdrop-filter: blur(15px);
            z-index: 1000; display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; perspective: 1000px;
        }

        /* 🌸 REALISTIC 3D FALLING PETALS / 🌧️ RAINDROPS */
        #petal-container { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        
        .real-petal {
            position: absolute; top: -30px; opacity: 0.9;
            animation: tumblePetal linear infinite; z-index: 0;
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.3);
        }
        @keyframes tumblePetal {
            0% { transform: translate3d(0, -20px, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            50% { transform: translate3d(var(--drift), 50vh, 0) rotateX(180deg) rotateY(90deg) rotateZ(180deg); }
            90% { opacity: 0.8; }
            100% { transform: translate3d(calc(var(--drift) * -1), 110vh, 0) rotateX(360deg) rotateY(180deg) rotateZ(360deg); opacity: 0; }
        }

        /* Rain Animation */
        .raindrop {
            position: absolute; top: -50px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(200,230,255,0.7));
            width: 2px; border-radius: 2px;
            animation: rainFall linear infinite; z-index: 0;
        }
        @keyframes rainFall {
            0% { transform: translateY(-50px); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        .modal-box {
            width: 90%; max-width: 500px; height: 80vh;
            background: rgba(255, 255, 255, 0.03); border: 1.5px solid rgba(247, 215, 123, 0.4);
            border-radius: 25px; box-shadow: 0 0 50px rgba(255, 77, 133, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative; padding: 20px; display: flex; flex-direction: column; z-index: 10;
        }

        .modal-close {
            position: absolute; top: -15px; right: -15px; width: 45px; height: 45px;
            background: linear-gradient(135deg, #ff4d85, #ff0040); color: #fff; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 20px #ff4d85; border: 2px solid #fff; -webkit-tap-highlight-color: transparent; z-index: 20;
        }

        .modal-header {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #f7d77b;
            text-align: center; margin-bottom: 15px; text-shadow: 0 0 15px rgba(247, 215, 123, 0.6);
            border-bottom: 1px solid rgba(247, 215, 123, 0.2); padding-bottom: 10px; z-index: 10;
        }

        .modal-content {
            flex-grow: 1; overflow-y: auto; padding-right: 10px; padding-top: 10px;
            scrollbar-width: none; -ms-overflow-style: none; z-index: 10;
        }
        .modal-content::-webkit-scrollbar { display: none; }

        /* ✨ Drop Cards for 100 Languages */
        .lang-card {
            position: relative; margin-bottom: 20px; padding: 15px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            border-radius: 15px; border-left: 4px solid #ff4d85;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); overflow: hidden; opacity: 0; transform: translateY(-30px);
        }
        .card-watermark { position: absolute; right: 10px; bottom: -5px; font-size: 3.5rem; opacity: 0.2; pointer-events: none; filter: grayscale(50%); z-index: -1; }
        .lang-card b { color: #f7d77b; font-family: 'Poppins', sans-serif; font-size: 1.1rem; text-shadow: 0 0 5px rgba(247, 215, 123, 0.3); }
        .lang-card p { margin: 5px 0 0 0; font-size: 1.05rem; color: #fff; line-height: 1.4; text-shadow: 0 1px 2px #000; }
        .lang-card span { display: block; font-size: 0.9rem; color: #ffb3c6; font-style: italic; margin-top: 8px; font-weight: 300; }
        .lang-special { text-align: center; color: #f7d77b; margin-top: 30px; padding: 20px; background: rgba(255, 77, 133, 0.1); border: 1px dashed #ff4d85; border-radius: 15px; box-shadow: 0 0 20px rgba(255, 77, 133, 0.2); font-size: 1.1rem; font-style: italic; }

        /* 🚫 NEVER CONDITIONS STYLES 🚫 */
        .condition-card {
            padding: 15px 20px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05); border-left: 4px solid #f7d77b;
            border-radius: 10px; color: #fff; font-size: 1.1rem; line-height: 1.4;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-family: 'Poppins', sans-serif;
            position: relative; overflow: hidden;
        }
        /* Special Formatting for Scolding/Irritating */
        .special-cond {
            font-family: 'Dancing Script', cursive; font-size: 1.8rem;
            text-align: center; border: 2px dashed; border-radius: 15px; padding: 20px;
            margin-top: 25px; margin-bottom: 25px; animation: pulseBox 2s infinite alternate;
        }
        .scold-cond {
            background: rgba(255, 77, 133, 0.15); border-color: #ff4d85; color: #ffebf0;
            text-shadow: 0 0 10px #ff4d85, 0 0 20px #ff4d85; box-shadow: 0 0 25px rgba(255, 77, 133, 0.3);
        }
        .irrit-cond {
            background: rgba(247, 215, 123, 0.15); border-color: #f7d77b; color: #fff;
            text-shadow: 0 0 10px #d4a737, 0 0 20px #f7d77b; box-shadow: 0 0 25px rgba(247, 215, 123, 0.3);
        }
        .never-conclusion {
            text-align: center; font-family: 'Dancing Script', cursive; font-size: 2.8rem;
            color: #ff4d85; text-shadow: 0 0 20px rgba(255, 77, 133, 0.9); margin-top: 30px; margin-bottom: 20px;
            animation: vibePulse 2s infinite;
        }

        /* ⏳ LIVE TOTAL CLOCK STYLES */
        .time-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; padding-top: 10px; }
        .t-box {
            background: rgba(255, 77, 133, 0.15); border: 1.5px solid rgba(255, 77, 133, 0.5); border-radius: 15px;
            width: 100%; min-height: 75px; padding: 10px 20px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(255, 77, 133, 0.2); animation: pulseBox 2s infinite alternate;
        }
        @keyframes pulseBox { 100% { box-shadow: 0 0 25px rgba(255, 77, 133, 0.5); } }
        .t-box span { font-size: 1.7rem; font-weight: bold; color: #f7d77b; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 10px rgba(247, 215, 123, 0.8); line-height: 1;}
        .t-box small { font-size: 1rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-family: 'Poppins', sans-serif;}

    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4d4d; stop-opacity:1" /><stop offset="50%" style="stop-color:#ff0040; stop-opacity:1" /><stop offset="100%" style="stop-color:#b3002d; stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <div id="entry-screen">
        <div id="face-id-container" onclick="startUnlockSequence()">
            <svg id="face-id-icon" viewBox="0 0 100 100">
                <path d="M 30,20 Q 20,20 20,30 L 20,40 M 70,20 Q 80,20 80,30 L 80,40 M 20,60 L 20,70 Q 20,80 30,80 M 80,60 L 80,70 Q 80,80 70,80" /><path d="M 40,40 L 40,50 M 60,40 L 60,50" /><path d="M 50,45 L 50,60 M 40,65 Q 50,75 60,65" />
            </svg>
            <svg id="scan-spinner" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" /></svg>
            <svg id="apple-tick" viewBox="0 0 100 100"><path class="tick-path" id="tick-mark" d="M 25,50 L 45,70 L 75,30" /></svg>
        </div>
        <div id="instruction-text">Tap to Scan Face ID</div>
        <div id="terminal-logs"></div>
    </div>

    <div id="main-world">
        <div id="heart-pool"></div>
        <div id="photo-pool"></div>
        <div id="menu-trigger" onclick="toggleMagicMenu()"><span id="trigger-icon">✉️</span></div>
    </div>

    <div id="magic-menu-overlay">
        <div class="magic-title">Love Recipe Guide</div>
        <div class="wheel-wrapper">
            <div class="wheel-container" id="wheel-spin-box">
                <div id="home-btn" onclick="toggleMagicMenu()">🏠</div>
                <div class="wheel-item" style="--i:0;"><div class="item-inner" onclick="handleItemClick('Love in Every Tongue')"><div class="wheel-icon"><span class="anim-globe">🌍</span></div><div class="wheel-label">Love in Every Tongue</div></div></div>
                
                <div class="wheel-item" style="--i:1;"><div class="item-inner" onclick="handleItemClick('I will stop loving you-')"><div class="wheel-icon"><span class="anim-infinity">🛑</span></div><div class="wheel-label">I will stop loving you-</div></div></div>
                
                <div class="wheel-item" style="--i:2;"><div class="item-inner" onclick="handleItemClick('Our Chemistry')"><div class="wheel-icon"><span class="anim-chem">🧪</span></div><div class="wheel-label">Our Chemistry</div></div></div>
                <div class="wheel-item" style="--i:3;"><div class="item-inner" onclick="handleItemClick('A Letter for You')"><div class="wheel-icon"><span class="anim-letter">💌</span></div><div class="wheel-label">A Letter for You</div></div></div>
                <div class="wheel-item" style="--i:4;"><div class="item-inner" onclick="handleItemClick('Us Since')"><div class="wheel-icon"><span class="anim-time">⏳</span></div><div class="wheel-label">Us Since</div></div></div>
                <div class="wheel-item" style="--i:5;"><div class="item-inner" onclick="handleItemClick('Make a Wish')"><div class="wheel-icon"><span class="anim-candle">🕯️</span></div><div class="wheel-label">Make a Wish</div></div></div>
            </div>
        </div>
        <div class="swipe-hint">&lt; SWIPE TO SPIN &gt;</div>
    </div>

    <div id="section-modal">
        <div id="petal-container"></div>
        <div class="modal-box">
            <div class="modal-close" onclick="closeSectionModal()">×</div>
            <div class="modal-header" id="modal-title">Title Here</div>
            <div class="modal-content" id="modal-body">
                </div>
        </div>
    </div>

    <script>
        /* SETUP & GLOBAL CLOCK ENGINE */
        let isScanning = false;
        let usSinceInterval; // Global clock interval
        let effectInterval;  // Global interval for rain/petals

        function updateClock() {
            if(!document.getElementById('t-y')) return; 

            const start = new Date('2023-04-05T00:00:00');
            const now = new Date();
            const diffMs = now.getTime() - start.getTime();
            
            const totalSeconds = Math.floor(diffMs / 1000);
            const totalMinutes = Math.floor(diffMs / (1000 * 60));
            const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
            const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);
            
            let totalMonths = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
            if (now.getDate() < start.getDate()) { totalMonths--; }
            
            let totalYears = now.getFullYear() - start.getFullYear();
            if (now.getMonth() < start.getMonth() || (now.getMonth() === start.getMonth() && now.getDate() < start.getDate())) {
                totalYears--;
            }

            const formatStr = (num) => num.toLocaleString('en-US');

            document.getElementById('t-y').innerText = formatStr(totalYears);
            document.getElementById('t-m').innerText = formatStr(totalMonths);
            document.getElementById('t-w').innerText = formatStr(totalWeeks);
            document.getElementById('t-d').innerText = formatStr(totalDays);
            document.getElementById('t-h').innerText = formatStr(totalHours);
            document.getElementById('t-min').innerText = formatStr(totalMinutes);
            document.getElementById('t-s').innerText = formatStr(totalSeconds);
        }

        const hackLogs = ["> Running DNA analysis...", "> Consulting Elon Musk...", "> Verifying Ahrnav’s haemoglobin...", "> Peeking Ahrnav’s heart...", "> Calling Stephen Hawking...", "> Hacking Ahrnav's mind...", "> Stole data from NASA...", "> Missed call rcvd from Jaadu...", "> Using Doraemon’s gadget...", `<div style="text-align: center; font-size: 1.8rem; color: #ff4d85; text-shadow: 0 0 15px #ff4d85; margin-top: 15px; font-weight: bold; font-family: 'Poppins', sans-serif;">Welcome Lovleen</div>`];
        
        function startUnlockSequence() {
            if(isScanning) return; isScanning = true;
            for(let i=1; i<=15; i++) { let img = new Image(); img.src = `photo1-${i}.jpg`; }
            document.getElementById('instruction-text').innerText = "Scanning...";
            document.getElementById('face-id-icon').style.opacity = '0.3'; document.getElementById('scan-spinner').style.display = 'block';
            const logBox = document.getElementById('terminal-logs'); logBox.innerHTML = ""; let logIndex = 0;
            const logInterval = setInterval(() => {
                if (logIndex < hackLogs.length) {
                    logBox.innerHTML += hackLogs[logIndex] + "<br>"; logBox.scrollTop = logBox.scrollHeight;
                    if (logIndex === hackLogs.length - 1) { confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff4d85', '#00ff00', '#ffffff'], zIndex: 9999 }); }
                    logIndex++;
                } else { clearInterval(logInterval); setTimeout(showGreenTick, 1500); }
            }, 1200); 
        }

        function showGreenTick() {
            document.getElementById('face-id-icon').style.display = 'none'; document.getElementById('scan-spinner').style.display = 'none';
            document.getElementById('instruction-text').innerText = "Access Granted."; document.getElementById('instruction-text').style.color = "#4cd964";

                svg.appendChild(path); inner.appendChild(svg); wrapper.appendChild(inner); hp.appendChild(wrapper);
            }
        }
        function spawnFishes() {
            const pp = document.getElementById('photo-pool');
            for(let i=1; i<=15; i++) {
                const riseWrap = document.createElement('div'); riseWrap.className = 'photo-rise'; riseWrap.style.left = 'calc(' + (Math.random() * 60 + 20) + 'vw - 55px)'; 
                riseWrap.style.animationDuration = (Math.random() * 8 + 10) + 's'; riseWrap.style.animationDelay = (Math.random() * -20) + 's';
                const wobbleWrap = document.createElement('div'); wobbleWrap.className = 'photo-wobble'; wobbleWrap.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
                const pBubble = document.createElement('div'); pBubble.className = 'photo-bubble';
                const img = document.createElement('img'); img.src = `photo1-${i}.jpg`; 
                img.onload = function() { this.style.opacity = '0.9'; }; img.onerror = function() { riseWrap.style.display = 'none'; };
                pBubble.appendChild(img); wobbleWrap.appendChild(pBubble); riseWrap.appendChild(wobbleWrap); pp.appendChild(riseWrap);
            }
        }
